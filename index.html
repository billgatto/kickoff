}

// ── MATCH RESULT SCREEN ──────────────────────────────────────────────────
function MatchResultScreen({ match, groupId }) {
  const { data, setData, push, goHome } = useApp();
  const date = fmtDate(match.date);

  // Calcola gol e assist per ogni giocatore in questa partita
  const scorers = {};
  const assists = {};
  match.goals.forEach(g => {
    scorers[g.playerId] = (scorers[g.playerId] || 0) + 1;
    if (g.assistantId) assists[g.assistantId] = (assists[g.assistantId] || 0) + 1;
  });

  const winner = match.scoreA > match.scoreB ? 'A' : match.scoreB > match.scoreA ? 'B' : null;

  // Aggiorna le statistiche cumulative dei giocatori nel gruppo (gol e assist)
  useEffect(() => {
    if (!groupId) return;
    setData(prev => ({
      ...prev,
      groups: prev.groups.map(g => {
        if (g.id !== groupId) return g;
        return {
          ...g,
          players: g.players.map(p => {
            const matchGoals = scorers[p.id] || 0;
            const matchAssists = assists[p.id] || 0;
            if (matchGoals === 0 && matchAssists === 0) return p;
            return {
              ...p,
              totalGoals: (p.totalGoals || 0) + matchGoals,
              totalAssists: (p.totalAssists || 0) + matchAssists,
              totalMatches: (p.totalMatches || 0) + 1,
            };
          }),
        };
      }),
    }));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []); // solo al mount

  // Classifica giocatori combinando gol+assist di tutta la partita
  const allPlayers = match.players || [];
  const playerStats = allPlayers.map(p => ({
    ...p,
    goals: scorers[p.id] || 0,
    assists: assists[p.id] || 0,
    points: (scorers[p.id] || 0) + (assists[p.id] || 0),
    team: match.teamA.some(x => x.id === p.id) ? 'A' : 'B',
  })).filter(p => p.goals > 0 || p.assists > 0)
    .sort((a, b) => b.points - a.points || b.goals - a.goals);

  const SectionLabel = ({ label }) => (
    <div style={{ color: T.sub, fontWeight: 900, fontSize: 10, letterSpacing: 2, textTransform: 'uppercase', marginBottom: 12, marginTop: 4 }}>{label}</div>
  );

  return (
    <Screen>
      <div style={{ padding: '0 0 32px' }}>

        {/* ── HERO SCORE ── */}
        <div style={{
          background: 'linear-gradient(160deg, #0d0d20 0%, #1a1a3a 100%)',
          padding: '52px 24px 32px',
          position: 'relative', overflow: 'hidden',
          borderBottom: `1px solid ${T.border}`,
        }}>
          {/* glow sfondo */}
          <div style={{ position: 'absolute', top: -60, left: -60, width: 220, height: 220, background: T.teamA, opacity: 0.07, borderRadius: '50%', filter: 'blur(40px)' }} />
          <div style={{ position: 'absolute', top: -60, right: -60, width: 220, height: 220, background: T.teamB, opacity: 0.07, borderRadius: '50%', filter: 'blur(40px)' }} />

          <div style={{ textAlign: 'center', marginBottom: 28, position: 'relative' }}>
            <div style={{ color: T.accent, fontWeight: 900, fontSize: 11, letterSpacing: 4, marginBottom: 6 }}>PARTITA TERMINATA</div>
            <div style={{ color: T.sub, fontSize: 13 }}>{date} • {match.time || ''}</div>
          </div>

          {/* Scorecard */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 0, position: 'relative' }}>
            {/* Team A */}
            <div style={{ flex: 1, textAlign: 'center' }}>
              <div style={{
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                width: 44, height: 44, borderRadius: 12,
                background: T.teamA + '33', border: `2px solid ${T.teamA}`,
                marginBottom: 8,
              }}>
                <span style={{ color: T.teamA, fontWeight: 900, fontSize: 16 }}>A</span>
              </div>
              <div style={{ color: T.teamA, fontWeight: 700, fontSize: 12, marginBottom: 6 }}>SQUADRA A</div>
              <div style={{ fontWeight: 900, fontSize: 72, color: winner === 'A' ? T.teamA : T.text, lineHeight: 1 }}>{match.scoreA}</div>
              {winner === 'A' && <div style={{ color: T.accent, fontSize: 11, fontWeight: 700, marginTop: 6 }}>🏆 VINCITORI</div>}
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, padding: '0 12px' }}>
              <div style={{ color: T.muted, fontWeight: 900, fontSize: 28 }}>:</div>
              {winner === null && <div style={{ color: T.warn, fontSize: 10, fontWeight: 700 }}>PAREGGIO</div>}
            </div>

            {/* Team B */}
            <div style={{ flex: 1, textAlign: 'center' }}>
              <div style={{
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                width: 44, height: 44, borderRadius: 12,
                background: T.teamB + '33', border: `2px solid ${T.teamB}`,
                marginBottom: 8,
              }}>
                <span style={{ color: T.teamB, fontWeight: 900, fontSize: 16 }}>B</span>
              </div>
              <div style={{ color: T.teamB, fontWeight: 700, fontSize: 12, marginBottom: 6 }}>SQUADRA B</div>
              <div style={{ fontWeight: 900, fontSize: 72, color: winner === 'B' ? T.teamB : T.text, lineHeight: 1 }}>{match.scoreB}</div>
              {winner === 'B' && <div style={{ color: T.accent, fontSize: 11, fontWeight: 700, marginTop: 6 }}>🏆 VINCITORI</div>}
            </div>
          </div>
        </div>

        <div style={{ padding: '24px 20px 0' }}>

          {/* ── TABELLINO CRONOLOGICO ── */}
          {match.goals.length > 0 && (
            <>
              <SectionLabel label="⚽ Tabellino Gol" />
              <div style={{ background: T.card, borderRadius: 16, overflow: 'hidden', border: `1px solid ${T.border}`, marginBottom: 24 }}>
                {/* header squadre */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 56px 1fr', background: T.surf, padding: '8px 16px', borderBottom: `1px solid ${T.border}` }}>
                  <div style={{ color: T.teamA, fontWeight: 800, fontSize: 11 }}>SQUADRA A</div>
                  <div style={{ textAlign: 'center', color: T.muted, fontSize: 11 }}>MIN</div>
                  <div style={{ color: T.teamB, fontWeight: 800, fontSize: 11, textAlign: 'right' }}>SQUADRA B</div>
                </div>
                {/* righe gol ordinate per minuto */}
                {[...match.goals].sort((a, b) => a.minute - b.minute).map((g, i) => {
                  const p = match.players.find(x => x.id === g.playerId);
                  const ast = match.players.find(x => x.id === g.assistantId);
                  const isA = g.team === 'A';
                  return (
                    <div key={i} style={{
                      display: 'grid', gridTemplateColumns: '1fr 56px 1fr',
                      padding: '10px 16px', alignItems: 'center',
                      borderBottom: i < match.goals.length - 1 ? `1px solid ${T.border}` : 'none',
                      background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)',
                    }}>
                      {/* col A */}
                      <div style={{ textAlign: 'left' }}>
                        {isA && (
                          <>
                            <div style={{ fontWeight: 700, fontSize: 13, color: T.teamA }}>
                              ⚽ {shortName(p?.name)}
                            </div>
                            {ast && <div style={{ fontSize: 10, color: T.sub, marginTop: 1 }}>👟 {shortName(ast.name)}</div>}
                          </>
                        )}
                      </div>
                      {/* minuto */}
                      <div style={{ textAlign: 'center', color: T.sub, fontWeight: 800, fontSize: 13 }}>{g.minute}'</div>
                      {/* col B */}
                      <div style={{ textAlign: 'right' }}>
                        {!isA && (
                          <>
                            <div style={{ fontWeight: 700, fontSize: 13, color: T.teamB }}>
                              {shortName(p?.name)} ⚽
                            </div>
                            {ast && <div style={{ fontSize: 10, color: T.sub, marginTop: 1 }}>{shortName(ast.name)} 👟</div>}
                          </>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {/* ── FORMAZIONI + GOL PER GIOCATORE ── */}
          <SectionLabel label="👥 Formazioni" />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 24 }}>
            {[
              { label: 'Squadra A', team: match.teamA, color: T.teamA, key: 'A' },
              { label: 'Squadra B', team: match.teamB, color: T.teamB, key: 'B' },
            ].map(({ label, team, color, key }) => (
              <div key={key} style={{ background: T.card, borderRadius: 16, border: `1px solid ${color}40`, overflow: 'hidden' }}>
                <div style={{ background: color + '22', padding: '10px 14px', borderBottom: `1px solid ${color}30` }}>
                  <div style={{ color, fontWeight: 800, fontSize: 12 }}>{label}</div>
                  <div style={{ color: key === 'A' ? T.teamA : T.teamB, fontWeight: 900, fontSize: 22, lineHeight: 1.1, marginTop: 2 }}>
                    {key === 'A' ? match.scoreA : match.scoreB} <span style={{ fontSize: 13, fontWeight: 500, opacity: 0.7 }}>gol</span>
                  </div>
                </div>
                <div style={{ padding: '8px 0' }}>
                  {team.map(p => {
                    const g = scorers[p.id] || 0;
                    const a = assists[p.id] || 0;
                    return (
                      <div key={p.id} style={{
                        display: 'flex', alignItems: 'center', gap: 10,
                        padding: '7px 14px',
                        background: (g > 0 || a > 0) ? color + '0d' : 'transparent',
                      }}>
                        <Avatar name={p.name} size={28} color={color} bg={T.surf} />
                        <div style={{ flex: 1, fontSize: 13, fontWeight: g > 0 ? 700 : 500, color: g > 0 ? T.text : T.sub }}>
                          {shortName(p.name)}
                        </div>
                        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                          {g > 0 && <span style={{ fontSize: 11, color, fontWeight: 800 }}>⚽{g}</span>}
                          {a > 0 && <span style={{ fontSize: 11, color: T.warn, fontWeight: 700 }}>👟{a}</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>

          {/* ── CLASSIFICA PARTITA ── */}
          {playerStats.length > 0 && (
            <>
              <SectionLabel label="🏅 MVP Partita" />
              <div style={{ background: T.card, borderRadius: 16, border: `1px solid ${T.border}`, overflow: 'hidden', marginBottom: 24 }}>
                {playerStats.map((p, i) => {
                  const teamColor = p.team === 'A' ? T.teamA : T.teamB;
                  const medals = ['🥇', '🥈', '🥉'];
                  return (
                    <div key={p.id} style={{
                      display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px',
                      borderBottom: i < playerStats.length - 1 ? `1px solid ${T.border}` : 'none',
                      background: i === 0 ? 'rgba(255,215,0,0.06)' : 'transparent',
                    }}>
                      <div style={{ width: 24, textAlign: 'center', fontSize: 16 }}>{medals[i] || `${i + 1}.`}</div>
                      <Avatar name={p.name} size={34} color={teamColor} bg={T.surf} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>{shortName(p.name)}</div>
                        <div style={{ fontSize: 11, color: teamColor, fontWeight: 600 }}>Squadra {p.team}</div>
                      </div>
                      <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                        {p.goals > 0 && (
                          <div style={{ textAlign: 'center' }}>
                            <div style={{ fontWeight: 900, fontSize: 18, color: T.accent }}>⚽{p.goals}</div>
                          </div>
                        )}
                        {p.assists > 0 && (
                          <div style={{ textAlign: 'center' }}>
                            <div style={{ fontWeight: 900, fontSize: 18, color: T.warn }}>👟{p.assists}</div>
                          </div>
                        )}
                        <div style={{ background: T.border, borderRadius: 8, padding: '3px 8px', fontSize: 11, fontWeight: 800, color: T.text }}>
                          {p.points} pt
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {/* ── CLASSIFICA CUMULATIVA GRUPPO ── */}
          {(() => {
            const group = data.groups.find(g => g.id === groupId);
            if (!group) return null;
            const ranked = [...group.players]
              .filter(p => (p.totalGoals || 0) + (p.totalAssists || 0) > 0)
              .sort((a, b) => ((b.totalGoals || 0) + (b.totalAssists || 0)) - ((a.totalGoals || 0) + (a.totalAssists || 0)));
            if (ranked.length === 0) return null;
            return (
              <>
                <SectionLabel label={`📊 Classifica Stagionale — ${group.name}`} />
                <div style={{ background: T.card, borderRadius: 16, border: `1px solid ${T.border}`, overflow: 'hidden', marginBottom: 24 }}>
                  {/* header */}
                  <div style={{ display: 'grid', gridTemplateColumns: '32px 1fr 44px 44px 44px', gap: 8, padding: '8px 14px', background: T.surf, borderBottom: `1px solid ${T.border}` }}>
                    {['#', 'Giocatore', '⚽', '👟', 'Pt'].map((h, i) => (
                      <div key={i} style={{ fontSize: 10, fontWeight: 800, color: T.sub, textAlign: i > 1 ? 'center' : 'left' }}>{h}</div>
                    ))}
                  </div>
                  {ranked.map((p, i) => {
                    const pts = (p.totalGoals || 0) + (p.totalAssists || 0);
                    return (
                      <div key={p.id} style={{
                        display: 'grid', gridTemplateColumns: '32px 1fr 44px 44px 44px', gap: 8,
                        padding: '10px 14px', alignItems: 'center',
                        borderBottom: i < ranked.length - 1 ? `1px solid ${T.border}` : 'none',
                        background: i === 0 ? 'rgba(255,215,0,0.05)' : 'transparent',
                      }}>
                        <div style={{ fontWeight: 800, fontSize: 13, color: i < 3 ? [T.warn, T.sub, '#cd7f32'][i] : T.muted }}>{i + 1}</div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <Avatar name={p.name} size={26} color={T.accent} bg={T.surf} />
                          <span style={{ fontSize: 13, fontWeight: 600 }}>{shortName(p.name)}</span>
                        </div>
                        <div style={{ textAlign: 'center', fontWeight: 800, fontSize: 14, color: T.accent }}>{p.totalGoals || 0}</div>
                        <div style={{ textAlign: 'center', fontWeight: 800, fontSize: 14, color: T.warn }}>{p.totalAssists || 0}</div>
                        <div style={{ textAlign: 'center', fontWeight: 900, fontSize: 14, color: T.text }}>{pts}</div>
                      </div>
                    );
                  })}
                </div>
              </>
            );
          })()}

          {/* CTA */}
          <div style={{ color: T.sub, fontSize: 12, textAlign: 'center', marginBottom: 14 }}>
            Fai uno screenshot per condividere la gloria! 🏆
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <Btn full label="📤 Condividi Risultato" onClick={() => push('share', { match: { ...match, groupName: data.groups.find(g => g.id === groupId)?.name || '' } })} />
            <Btn full secondary label="Torna alla Home" onClick={goHome} />
          </div>
        </div>
      </div>
    </Screen>
  );
}

// ── PROFILE SCREEN ────────────────────────────────────────────────────────
function ProfileScreen() {
  const { data, setData } = useApp();
  const [profileTab, setProfileTab] = useState('profilo');
  const [isEditing, setIsEditing] = useState(false);
  const [tempName, setTempName] = useState(data.user.name);
  const [tgToken, setTgToken] = useState(data.telegramConfig?.token || '');
  const [tgEnabled, setTgEnabled] = useState(data.telegramConfig?.enabled || false);
  const [tgTest, setTgTest] = useState('');
  const [tgTestChatId, setTgTestChatId] = useState('');

  const allGoals = data.groups.flatMap(g => g.matches.flatMap(m => m.goals.filter(goal => goal.playerId === data.user.id)));
  const matchesCount = data.groups.flatMap(g => g.matches.filter(m => m.status === 'finished' && [...m.teamA, ...m.teamB].some(p => p.id === data.user.id))).length;
  const winsCount = data.groups.flatMap(g => g.matches.filter(m => {
    if (m.status !== 'finished') return false;
    const inA = m.teamA.some(p => p.id === data.user.id);
    const inB = m.teamB.some(p => p.id === data.user.id);
    return (inA && m.scoreA > m.scoreB) || (inB && m.scoreB > m.scoreA);
  })).length;

  const saveName = () => {
    if (!tempName.trim()) return;
    setData(prev => ({ ...prev, user: { ...prev.user, name: tempName.trim() } }));
    setIsEditing(false);
  };

  const saveTelegram = () => {
    setData(prev => ({ ...prev, telegramConfig: { ...prev.telegramConfig, token: tgToken, enabled: tgEnabled } }));
    showToast('Configurazione Telegram salvata!');
  };

  const testTelegram = async () => {
    if (!tgToken || !tgTestChatId) { setTgTest('⚠️ Inserisci token e chat ID'); return; }
    setTgTest('Invio in corso...');
    const ok = await sendTelegramMsg(tgToken, tgTestChatId, '✅ <b>Kickoff Pro</b> — connessione Telegram funzionante!');
    setTgTest(ok ? '✅ Messaggio inviato con successo!' : '❌ Errore: verifica token e chat ID');
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `kickoff_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (re) => {
      try {
        const imported = JSON.parse(re.target.result);
        if (confirm("ATTENZIONE: Importando i dati sovrascriverai quelli attuali. Procedere?")) {
          setData(imported);
          showToast('Dati importati con successo!');
        }
      } catch { showToast('File non valido', 'error'); }
    };
    reader.readAsText(file);
  };

  const profileTabs = [
    { id: 'profilo', label: 'Profilo', icon: 'fa-user' },
    { id: 'telegram', label: 'Telegram', icon: 'fa-telegram fab' },
    { id: 'backup', label: 'Backup', icon: 'fa-database' },
  ];

  const InputField = ({ label, icon, ...props }) => (
    <div style={{ marginBottom: 16 }}>
      <div style={{ color: T.sub, fontSize: 11, fontWeight: 700, marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.8 }}>
        <i className={`fas ${icon}`} style={{ color: T.primary, marginRight: 5, fontSize: 10 }} />{label}
      </div>
      <input style={{
        width: '100%', background: T.card, border: `2px solid ${T.border}`,
        borderRadius: 12, padding: '12px 16px', color: T.text, fontSize: 15, outline: 'none',
      }}
        onFocus={e => e.target.style.borderColor = T.primary}
        onBlur={e => e.target.style.borderColor = T.border}
        {...props}
      />
    </div>
  );

  return (
    <Screen>
      {/* Profile hero */}
      <div style={{
        background: `linear-gradient(135deg, ${T.primaryDark} 0%, #312e81 100%)`,
        padding: '52px 20px 28px', textAlign: 'center',
      }}>
        <Avatar name={data.user.name} size={72} color="#fff" />
        {isEditing ? (
          <div style={{ marginTop: 12, display: 'flex', gap: 8, justifyContent: 'center' }}>
            <input value={tempName} onChange={e => setTempName(e.target.value)} autoFocus
              style={{ background: 'rgba(255,255,255,.15)', border: '2px solid rgba(255,255,255,.4)', borderRadius: 10, padding: '6px 14px', color: '#fff', fontSize: 16, outline: 'none', width: 180 }} />
            <button onClick={saveName} style={{ background: T.accent, color: '#fff', borderRadius: 10, padding: '6px 14px', fontWeight: 700 }}>
              <i className="fas fa-check" />
            </button>
          </div>
        ) : (
          <div style={{ marginTop: 12 }}>
            <div style={{ fontWeight: 800, fontSize: 22 }}>{data.user.name}</div>
            <button onClick={() => setIsEditing(true)} style={{ color: 'rgba(255,255,255,.6)', fontSize: 12, marginTop: 4 }}>
              <i className="fas fa-pen" style={{ marginRight: 4 }} />Modifica nome
            </button>
          </div>
        )}
        {/* Stats row */}
        <div style={{ display: 'flex', gap: 12, marginTop: 20, justifyContent: 'center' }}>
          {[
            { val: matchesCount, label: 'Partite', icon: 'fa-futbol' },
            { val: allGoals.length, label: 'Gol', icon: 'fa-circle-dot' },
            { val: winsCount, label: 'Vittorie', icon: 'fa-trophy' },
          ].map(s => (
            <div key={s.label} style={{ textAlign: 'center', background: 'rgba(255,255,255,.12)', borderRadius: 12, padding: '8px 16px' }}>
              <i className={`fas ${s.icon}`} style={{ color: T.gold, display: 'block', marginBottom: 2 }} />
              <div style={{ fontWeight: 900, fontSize: 20 }}>{s.val}</div>
              <div style={{ fontSize: 10, opacity: 0.7 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ padding: '16px 20px 20px' }}>
        {/* Profile sub-tabs */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 20 }}>
          {profileTabs.map(t => (
            <button key={t.id} onClick={() => setProfileTab(t.id)} style={{
              flex: 1, padding: '9px 4px', borderRadius: 10, fontWeight: 700, fontSize: 12,
              background: profileTab === t.id ? T.primary : T.card,
              color: profileTab === t.id ? '#fff' : T.sub, border: `1px solid ${profileTab === t.id ? T.primary : T.border}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
              boxShadow: profileTab === t.id ? `0 2px 10px ${T.primaryGlow}` : 'none',
            }}>
              <i className={`fas ${t.icon}`} style={{ fontSize: 11 }} />{t.label}
            </button>
          ))}
        </div>

        {profileTab === 'profilo' && (
          <>
            {/* Role & player association */}
            <Card style={{ marginBottom: 14 }}>
              <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 8 }}>
                <i className="fas fa-shield-halved" style={{ color: T.primary }} />Ruolo & Associazione
              </div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                <button onClick={() => setData(prev => ({ ...prev, user: { ...prev.user, role: prev.user.role === 'admin' ? 'player' : 'admin' } }))} style={{
                  background: data.user.role === 'admin' ? T.primaryGlow : T.card,
                  color: data.user.role === 'admin' ? T.primary : T.sub,
                  border: `1px solid ${data.user.role === 'admin' ? T.primary : T.border}`,
                  borderRadius: 20, padding: '7px 16px', fontWeight: 700, fontSize: 13,
                }}>
                  <i className={`fas ${data.user.role === 'admin' ? 'fa-shield' : 'fa-user'}`} style={{ marginRight: 5 }} />
                  {data.user.role === 'admin' ? 'Admin' : 'Giocatore'}
                </button>
                <select value={data.user.id === 'admin' ? '' : data.user.id}
                  onChange={(e) => {
                    const pid = e.target.value;
                    if (!pid) { setData(prev => ({ ...prev, user: { ...prev.user, id: 'admin' } })); return; }
                    const player = data.groups.flatMap(g => g.players).find(p => String(p.id) === pid);
                    if (player) setData(prev => ({ ...prev, user: { ...prev.user, id: player.id, name: player.name } }));
                  }}
                  style={{
                    background: T.card, color: T.text, border: `1px solid ${T.border}`,
                    borderRadius: 20, padding: '7px 14px', fontWeight: 600, fontSize: 13, outline: 'none',
                  }}>
                  <option value="">🔗 Associa Giocatore</option>
                  {Array.from(new Map(data.groups.flatMap(g => g.players).map(p => [p.id, p])).values()).map(p => (
                    <option key={p.id} value={p.id}>{p.name}</option>
                  ))}
                </select>
              </div>
            </Card>

            <button onClick={() => {
              if (confirm("Sei sicuro? Questo cancellerà TUTTI i dati. Non si può tornare indietro.")) {
                localStorage.removeItem('kickoff_data'); window.location.reload();
              }
            }} style={{
              width: '100%', padding: '12px', borderRadius: 12, fontWeight: 700, fontSize: 14,
              background: T.dangerDim, color: T.danger, border: `1px solid ${T.danger}40`,
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            }}>
              <i className="fas fa-trash" />Reset completo dati
            </button>
          </>
        )}

        {profileTab === 'telegram' && (
          <Card>
            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, display: 'flex', alignItems: 'center', gap: 8 }}>
              <i className="fab fa-telegram" style={{ color: '#0088cc', fontSize: 20 }} />Configurazione Bot Telegram
            </div>
            <div style={{
              background: '#0088cc18', border: '1px solid #0088cc40', borderRadius: 10,
              padding: '10px 14px', marginBottom: 16, fontSize: 13, color: '#60c0f0',
            }}>
              <i className="fas fa-circle-info" style={{ marginRight: 6 }} />
              Crea un bot con <b>@BotFather</b> su Telegram per inviare convocazioni e risultati automaticamente.
            </div>
            <InputField label="Bot Token" icon="fa-key" value={tgToken} onChange={e => setTgToken(e.target.value)} placeholder="123456789:ABCdefGHI..." />
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
              <span style={{ flex: 1, fontWeight: 600, fontSize: 14 }}>Notifiche abilitate</span>
              <button onClick={() => setTgEnabled(e => !e)} style={{
                width: 48, height: 26, borderRadius: 13, position: 'relative',
                background: tgEnabled ? T.accent : T.border, transition: 'background .2s',
              }}>
                <div style={{
                  width: 20, height: 20, borderRadius: '50%', background: '#fff',
                  position: 'absolute', top: 3, left: tgEnabled ? 25 : 3,
                  transition: 'left .2s', boxShadow: '0 1px 4px rgba(0,0,0,.3)',
                }} />
              </button>
            </div>
            <Btn full label="Salva configurazione" iconFa="fa-save" onClick={saveTelegram} style={{ marginBottom: 16 }} />
            <div style={{ borderTop: `1px solid ${T.border}`, paddingTop: 16, marginTop: 4 }}>
              <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 10, color: T.sub }}>
                <i className="fas fa-vial" style={{ marginRight: 6 }} />Test connessione
              </div>
              <InputField label="Chat ID destinatario test" icon="fa-user" value={tgTestChatId} onChange={e => setTgTestChatId(e.target.value)} placeholder="Tuo chat ID Telegram" />
              <Btn full secondary label="Invia messaggio di prova" iconFa="fa-paper-plane" onClick={testTelegram} />
              {tgTest && (
                <div style={{
                  marginTop: 10, padding: '10px 14px', borderRadius: 10, fontSize: 13, fontWeight: 600,
                  background: tgTest.startsWith('✅') ? T.accentDim : tgTest.startsWith('❌') ? T.dangerDim : T.card,
                  color: tgTest.startsWith('✅') ? T.accent : tgTest.startsWith('❌') ? T.danger : T.sub,
                  border: `1px solid ${tgTest.startsWith('✅') ? T.accent : tgTest.startsWith('❌') ? T.danger : T.border}40`,
                }}>{tgTest}</div>
              )}
            </div>
          </Card>
        )}

        {profileTab === 'backup' && (
          <Card>
            <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, display: 'flex', alignItems: 'center', gap: 8 }}>
              <i className="fas fa-database" style={{ color: T.primary }} />Backup & Sincronizzazione
            </div>
            <div style={{ color: T.sub, fontSize: 13, marginBottom: 20, lineHeight: 1.6 }}>
              Esporta i tuoi dati su file JSON per trasferirli su un altro dispositivo o per conservare una copia di sicurezza.
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <Btn full label="Esporta Backup" iconFa="fa-file-export" onClick={exportData} />
              <div style={{ position: 'relative' }}>
                <input type="file" accept=".json" onChange={importData} style={{ position: 'absolute', inset: 0, opacity: 0, cursor: 'pointer', zIndex: 1 }} />
                <Btn full secondary label="Importa Backup" iconFa="fa-file-import" onClick={() => {}} />
              </div>
            </div>
          </Card>
        )}
      </div>
    </Screen>
  );
}

  const allGoals = data.groups.flatMap(g => g.matches.flatMap(m => m.goals.filter(goal => goal.playerId === data.user.id)));
  const matchesCount = data.groups.flatMap(g => g.matches.filter(m => m.status === 'finished' && [...m.teamA, ...m.teamB].some(p => p.id === data.user.id))).length;
  const winsCount = data.groups.flatMap(g => g.matches.filter(m => {
    if (m.status !== 'finished') return false;
    const inA = m.teamA.some(p => p.id === data.user.id);
    const inB = m.teamB.some(p => p.id === data.user.id);
    return (inA && m.scoreA > m.scoreB) || (inB && m.scoreB > m.scoreA);
  })).length;

  const saveName = () => {
    if (!tempName.trim()) return;
    setData(prev => ({ ...prev, user: { ...prev.user, name: tempName.trim() } }));
    setIsEditing(false);
  };


// ── BOTTOM NAV ────────────────────────────────────────────────────────────
const TABS = [
  { id: 'home',          icon: 'fa-house',        label: 'Home' },
  { id: 'groups',        icon: 'fa-users',         label: 'Gruppi' },
  { id: 'convocazioni',  icon: 'fa-bell',          label: 'Convocazioni' },
  { id: 'profile',       icon: 'fa-circle-user',   label: 'Profilo' },
];

function BottomNav({ tab, setTab }) {
  const { data } = useApp();
  const pending = data.convocazioni.filter(c => c.status === 'pending').length;
  const livePending = data.groups.flatMap(g =>
    g.matches.filter(m => (m.status === 'upcoming' || m.status === 'live') &&
      m.players?.some(p => p.id === data.user.id && !p.presence))
  ).length;
  const badgeCount = pending + livePending;

  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      background: T.surf, borderTop: `1px solid ${T.border}`,
      display: 'flex', padding: '6px 0 max(env(safe-area-inset-bottom),12px)', zIndex: 20,
      backdropFilter: 'blur(12px)',
    }}>
      {TABS.map(t => (
        <button key={t.id} onClick={() => setTab(t.id)} style={{
          flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
          padding: '4px 0', position: 'relative', transition: 'all .2s',
        }}>
          <div style={{
            width: 36, height: 36, borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: tab === t.id ? T.primaryGlow : 'transparent',
            transition: 'all .2s',
          }}>
            <i className={`fas ${t.icon}`} style={{ fontSize: 18, color: tab === t.id ? T.primary : T.sub }} />
          </div>
          <span style={{ fontSize: 10, fontWeight: tab === t.id ? 700 : 500, color: tab === t.id ? T.primary : T.sub }}>
            {t.label}
          </span>
          {t.id === 'convocazioni' && badgeCount > 0 && (
            <div style={{
              position: 'absolute', top: 2, right: '18%', width: 18, height: 18,
              background: T.danger, borderRadius: '50%', fontSize: 9,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontWeight: 800, color: '#fff', border: `2px solid ${T.surf}`,
            }}>{badgeCount}</div>
          )}
        </button>
      ))}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(() => {
    try { const s = localStorage.getItem('kickoff_data'); return s ? JSON.parse(s) : INIT_DATA; } catch { return INIT_DATA; }
  });
  const [tab, setTab] = useState('home');
  const [stack, setStack] = useState([]);

  useEffect(() => {
    try { localStorage.setItem('kickoff_data', JSON.stringify(data)); } catch {}
  }, [data]);

  const push = useCallback((screen, params = {}) => setStack(s => [...s, { screen, params }]), []);
  const pop = useCallback(() => setStack(s => s.slice(0, -1)), []);
  const goHome = useCallback(() => { setStack([]); setTab('home'); }, []);

  const renderScreen = (s) => {
    if (!s) {
      if (tab === 'home') return <HomeScreen />;
      if (tab === 'groups') return <GroupsScreen />;
      if (tab === 'convocazioni') return <ConvocazioniScreen />;
      if (tab === 'profile') return <ProfileScreen />;
    }
    const { screen, params } = s;
    if (screen === 'groupDetail') return <GroupDetailScreen {...params} />;
    if (screen === 'createMatch') return <CreateMatchScreen {...params} />;
    if (screen === 'matchDetail') return <MatchDetailScreen {...params} />;
    if (screen === 'live') return <LiveScreen {...params} />;
    if (screen === 'share') return <ShareScreen {...params} />;
    if (screen === 'matchResult') return <MatchResultScreen {...params} />;
    return null;
  };

  const current = stack[stack.length - 1] || null;
  const showNav = !current || !['live'].includes(current.screen);

  return (
    <Ctx.Provider value={{ data, setData, push, pop, goHome }}>
      <div style={{
        width: '100%',
        maxWidth: stack.length > 0 && stack[stack.length-1].screen === 'live' ? '100%' : 520,
        margin: '0 auto', height: '100dvh',
        background: T.bg, position: 'relative', overflow: 'hidden',
        boxShadow: '0 0 80px rgba(99,102,241,.08)',
        transition: 'max-width .3s ease',
      }}>
        <div style={{ height: showNav ? 'calc(100% - 76px)' : '100%', overflow: 'hidden' }}>
          {renderScreen(current)}
        </div>
        {showNav && <BottomNav tab={tab} setTab={(t) => { setTab(t); setStack([]); }} />}
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

if ('serviceWorker' in navigator) {

      .catch(e => console.warn('SW errore:', e));
  });
}
</script>
