<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kickoff Pro</title>
<meta name="description" content="Gestisci le tue partite di calcetto">
<meta name="theme-color" content="#0f0f1e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kickoff Pro">
<link rel="manifest" href="kickoff-manifest.json">
<link rel="apple-touch-icon" href="kickoff-icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --primary: #6366f1; --primary-dark: #4f46e5; --primary-glow: rgba(99,102,241,.25);
    --accent: #10b981; --accent-dim: rgba(16,185,129,.13);
    --gold: #fbbf24; --gold-dim: rgba(251,191,36,.15);
    --danger: #ef4444; --danger-dim: rgba(239,68,68,.13);
    --warn: #f59e0b; --warn-dim: rgba(245,158,11,.13);
    --teamA: #3b82f6; --teamB: #f97316;
    --bg: #0b0b18; --surf: #11112a; --card: #181830; --card2: #1e1e38;
    --border: #2a2a48; --border2: #343458;
    --text: #f1f5f9; --sub: #7878a8; --muted: #3a3a5a;
    --radius: 16px; --radius-sm: 10px; --radius-lg: 24px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; width: 100%; }
  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    color: var(--text); -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  #root { display: flex; justify-content: center; align-items: center; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  input, button, textarea, select { font-family: inherit; }
  button { cursor: pointer; border: none; background: none; color: inherit; }

  /* ── Global animations ── */
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse   { 0%,100% { box-shadow: 0 0 0 0 var(--primary-glow); } 50% { box-shadow: 0 0 0 8px transparent; } }
  @keyframes goalPop { 0% { transform: translateX(-50%) scale(.7); opacity:0; }
                       20% { transform: translateX(-50%) scale(1.1); opacity:1; }
                       80% { transform: translateX(-50%) scale(1); opacity:1; }
                       100% { transform: translateX(-50%) scale(.95); opacity:0; } }

  /* ── Landscape Live layout ── */
  @media (orientation: landscape) and (max-height: 600px) {
    .live-landscape { flex-direction: row !important; gap: 12px !important; }
    .live-scorebar { min-width: 220px; max-width: 240px; padding: 10px !important; }
    .live-scorebar .timer-val { font-size: 32px !important; }
    .live-scorebar .score-val { font-size: 40px !important; }
    .live-controls { flex-wrap: wrap; gap: 6px !important; }
    .live-controls button { padding: 7px 12px !important; font-size: 12px !important; }
    .live-players-wrap { flex: 1; overflow-y: auto; }
  }

  /* ── Notification toast ── */
  .kf-toast {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    background: var(--accent); color: #fff;
    padding: 12px 20px; border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 14px;
    transform: translateX(120%); transition: transform .3s ease;
    max-width: 320px;
  }
  .kf-toast.show { transform: translateX(0); }
  .kf-toast.error { background: var(--danger); }
  .kf-toast.warn  { background: var(--warn); color: #000; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext, useMemo } = React;

// ── THEME (mirrors CSS vars) ───────────────────────────────────────────────
const T = {
  bg: '#0b0b18', surf: '#11112a', card: '#181830', card2: '#1e1e38',
  border: '#2a2a48', border2: '#343458',
  accent: '#10b981', accentDim: 'rgba(16,185,129,.13)',
  primary: '#6366f1', primaryDark: '#4f46e5', primaryGlow: 'rgba(99,102,241,.25)',
  gold: '#fbbf24', goldDim: 'rgba(251,191,36,.15)',
  text: '#f1f5f9', sub: '#7878a8', muted: '#3a3a5a',
  danger: '#ef4444', dangerDim: 'rgba(239,68,68,.13)',
  warn: '#f59e0b', warnDim: 'rgba(245,158,11,.13)',
  teamA: '#3b82f6', teamB: '#f97316',
};

// ── TOAST ─────────────────────────────────────────────────────────────────
let _toastTimer = null;
const showToast = (msg, type = 'success') => {
  let el = document.getElementById('kf-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'kf-toast';
    el.className = 'kf-toast';
    el.innerHTML = '<i class="fas fa-check-circle"></i><span></span>';
    document.body.appendChild(el);
  }
  el.className = `kf-toast ${type === 'error' ? 'error' : type === 'warn' ? 'warn' : ''}`;
  const icon = el.querySelector('i');
  icon.className = type === 'error' ? 'fas fa-exclamation-circle' : type === 'warn' ? 'fas fa-exclamation-triangle' : 'fas fa-check-circle';
  el.querySelector('span').textContent = msg;
  clearTimeout(_toastTimer);
  el.classList.add('show');
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
};

// ── AUDIO ──────────────────────────────────────────────────────────────────
const playBeep = (n = 1, freq = 880, vol = 0.5) => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < n; i++) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'square';
      const t = ctx.currentTime + i * 0.38;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      o.start(t); o.stop(t + 0.28);
    }
  } catch (e) {}
};
const playGoalSound = () => { playBeep(2, 660, 0.4); };

// Fischio prolungato per cambio portiere: 3 toni lunghi + vibrazione
const playKeeperSound = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Fischio: 3 toni da 0.7s con breve pausa
    [[0, 880, 0.7], [0.85, 880, 0.7], [1.7, 1100, 1.1]].forEach(([delay, freq, dur]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sine';
      const t = ctx.currentTime + delay;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.55, t + 0.04);
      g.gain.setValueAtTime(0.55, t + dur - 0.08);
      g.gain.linearRampToValueAtTime(0, t + dur);
      o.start(t); o.stop(t + dur);
    });
  } catch (e) {}
  // Vibrazione su mobile
  if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 600]);
};

// Bip breve per conto alla rovescia ogni 5 secondi
const playCountdownBeep = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 660; o.type = 'sine';
    const t = ctx.currentTime;
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.start(t); o.stop(t + 0.15);
  } catch (e) {}
};

// ── UTILS ──────────────────────────────────────────────────────────────────
const fmt = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
const initials = n => n.split(' ').map(x => x[0]).join('').toUpperCase().slice(0, 2);
const shuffle = a => [...a].sort(() => Math.random() - 0.5);
const fmtDate = d => { const dt = new Date(d); return dt.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' }); };
const shortName = n => { if(!n) return ''; const p = n.split(' '); return p[0] + (p[1] ? ' ' + p[1][0] + '.' : ''); };

// ── DATA ───────────────────────────────────────────────────────────────────
const PLAYERS_POOL = [];

const INIT_DATA = {
  user: { id: 'admin', name: 'Amministratore', role: 'admin' },
  groups: [],
  convocazioni: [],
  telegramConfig: { token: '', enabled: false },
};

// ── TELEGRAM ──────────────────────────────────────────────────────────────
const sendTelegramMsg = async (token, chatId, text) => {
  if (!token || !chatId) return false;
  try {
    const r = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId, text, parse_mode: 'HTML' }),
    });
    const j = await r.json();
    return j.ok;
  } catch { return false; }
};

const buildConvocazioneText = (match, groupName) => {
  return `⚽ <b>CONVOCAZIONE</b>\n\n` +
    `📅 <b>${fmtDate(match.date)}</b> alle ${match.time}\n` +
    `📍 ${match.location || 'Da definire'}\n` +
    `👥 Gruppo: ${groupName}\n\n` +
    `Rispondi "SÌ" per confermare la tua presenza!`;
};

const buildRisultatoText = (match, groupName) => {
  const winner = match.scoreA > match.scoreB ? 'Squadra A 🔵' : match.scoreB > match.scoreA ? 'Squadra B 🟠' : 'Pareggio';
  const scorers = match.goals.map(g => {
    const p = match.players.find(pl => pl.id === g.playerId);
    const ast = match.players.find(pl => pl.id === g.assistantId);
    return `  ⚽ ${p?.name || '?'} (${g.minute}')${ast ? ` [ast. ${ast.name.split(' ')[0]}]` : ''}`;
  }).join('\n');
  return `🏆 <b>RISULTATO FINALE</b>\n\n` +
    `👥 ${groupName}\n` +
    `📅 ${fmtDate(match.date)}\n\n` +
    `🔵 Squadra A  <b>${match.scoreA} - ${match.scoreB}</b>  Squadra B 🟠\n\n` +
    `${match.scoreA !== match.scoreB ? `🏆 Vincitore: ${winner}\n\n` : `🤝 Pareggio!\n\n`}` +
    `${scorers ? `Marcatori:\n${scorers}` : 'Nessun gol registrato'}`;
};

// ── CONTEXT ────────────────────────────────────────────────────────────────
const Ctx = createContext();
const useApp = () => useContext(Ctx);

// ── SHARED COMPONENTS ─────────────────────────────────────────────────────
const ROLE_COLORS = {
  'Portiere': '#f59e0b', 'Difensore': '#3b82f6', 'Centrocampista': '#8b5cf6',
  'Attaccante': '#ef4444', 'Tuttocampista': '#10b981',
};
const ROLE_ICONS = {
  'Portiere': 'fa-hand', 'Difensore': 'fa-shield', 'Centrocampista': 'fa-arrows-to-circle',
  'Attaccante': 'fa-bolt', 'Tuttocampista': 'fa-star',
};

const Avatar = ({ name, size = 36, bg = T.card2, color = T.primary }) => (
  <div style={{
    width: size, height: size, borderRadius: '50%',
    background: `linear-gradient(135deg, ${color}33, ${color}11)`,
    border: `2px solid ${color}55`,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    fontSize: size * 0.34, fontWeight: 800, color, flexShrink: 0, letterSpacing: '-0.5px',
    boxShadow: `0 2px 8px ${color}22`,
  }}>{initials(name)}</div>
);

const RoleBadge = ({ role }) => {
  const color = ROLE_COLORS[role] || T.sub;
  const icon = ROLE_ICONS[role] || 'fa-user';
  return (
    <span style={{
      background: color + '22', color, borderRadius: 20, padding: '2px 10px',
      fontSize: 11, fontWeight: 700, display: 'inline-flex', alignItems: 'center', gap: 4,
    }}>
      <i className={`fas ${icon}`} style={{ fontSize: 9 }} />
      {role || 'Giocatore'}
    </span>
  );
};

const Pill = ({ label, color = T.accent, icon }) => (
  <span style={{
    background: color + '22', color, borderRadius: 20, padding: '3px 11px',
    fontSize: 11, fontWeight: 700, display: 'inline-flex', alignItems: 'center', gap: 4,
  }}>
    {icon && <i className={`fas ${icon}`} style={{ fontSize: 9 }} />}
    {label}
  </span>
);

const Btn = ({ label, onClick, full, secondary, danger, small, icon, iconFa, disabled, style: extraStyle }) => (
  <button onClick={onClick} disabled={disabled} style={{
    width: full ? '100%' : 'auto',
    padding: small ? '9px 18px' : '13px 24px',
    borderRadius: 12, fontWeight: 700, fontSize: small ? 13 : 15,
    background: danger ? T.danger : secondary ? 'transparent' : T.primary,
    color: danger ? '#fff' : secondary ? T.text : '#fff',
    border: secondary ? `2px solid ${T.border2}` : 'none',
    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
    letterSpacing: 0.2, transition: 'all .18s',
    boxShadow: (!secondary && !danger) ? `0 4px 14px ${T.primaryGlow}` : 'none',
    opacity: disabled ? 0.45 : 1,
    ...extraStyle,
  }}>
    {iconFa && <i className={`fas ${iconFa}`} />}
    {icon && <span>{icon}</span>}
    {label}
  </button>
);

const Divider = () => <div style={{ height: 1, background: T.border, margin: '4px 0' }} />;

const Screen = ({ children, style }) => (
  <div style={{ height: '100%', overflowY: 'auto', background: T.bg, ...style }}>{children}</div>
);

const Header = ({ title, back, action }) => {
  const { pop } = useApp();
  return (
    <div style={{
      padding: '52px 20px 14px', display: 'flex', alignItems: 'center', gap: 12,
      background: `linear-gradient(180deg, ${T.surf} 0%, ${T.bg} 100%)`,
      position: 'sticky', top: 0, zIndex: 10,
      borderBottom: `1px solid ${T.border}`,
      backdropFilter: 'blur(12px)',
    }}>
      {back && (
        <button onClick={pop} style={{
          color: T.primary, fontSize: 20, width: 36, height: 36, borderRadius: 10,
          background: T.primaryGlow, display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}><i className="fas fa-chevron-left" /></button>
      )}
      <span style={{ fontWeight: 800, fontSize: 20, flex: 1, letterSpacing: -0.3 }}>{title}</span>
      {action}
    </div>
  );
};

const Card = ({ children, style, onClick }) => (
  <div onClick={onClick} style={{
    background: T.card, borderRadius: 16, padding: 16,
    border: `1px solid ${T.border}`,
    boxShadow: '0 4px 16px rgba(0,0,0,.18)',
    transition: onClick ? 'transform .15s, box-shadow .15s' : undefined,
    cursor: onClick ? 'pointer' : 'default',
    ...style,
  }}
  onMouseEnter={onClick ? e => { e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 8px 24px rgba(0,0,0,.28)'; } : undefined}
  onMouseLeave={onClick ? e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,.18)'; } : undefined}
  >{children}</div>
);

// ── HOME SCREEN ────────────────────────────────────────────────────────────
function HomeScreen() {
  const { data, push, setData } = useApp();
  const upcoming = data.groups.flatMap(g =>
    g.matches.filter(m => m.status === 'upcoming' || m.status === 'live')
      .map(m => ({ ...m, groupName: g.name, groupId: g.id }))
  ).sort((a, b) => a.date.localeCompare(b.date));
  const recent = data.groups.flatMap(g =>
    g.matches.filter(m => m.status === 'finished').map(m => ({ ...m, groupName: g.name }))
  ).slice(0, 3);

  const totalGoals = data.groups.flatMap(g => g.matches.flatMap(m => m.goals)).length;
  const totalMatches = data.groups.flatMap(g => g.matches.filter(m => m.status === 'finished')).length;
  const totalGroups = data.groups.length;

  return (
    <Screen>
      {/* Hero header */}
      <div style={{
        background: `linear-gradient(135deg, ${T.primaryDark} 0%, #312e81 100%)`,
        padding: '52px 20px 28px', position: 'relative', overflow: 'hidden',
      }}>
        <div style={{ position: 'absolute', top: -40, right: -40, width: 180, height: 180, borderRadius: '50%', background: 'rgba(255,255,255,.06)' }} />
        <div style={{ position: 'absolute', bottom: -60, left: -30, width: 140, height: 140, borderRadius: '50%', background: 'rgba(255,255,255,.04)' }} />
        <div style={{ position: 'relative' }}>
          <div style={{ color: 'rgba(255,255,255,.6)', fontSize: 13, marginBottom: 4 }}>Benvenuto,</div>
          <div style={{ fontWeight: 900, fontSize: 26, letterSpacing: -0.5, marginBottom: 20 }}>
            <i className="fas fa-futbol" style={{ marginRight: 10, color: T.gold }} />
            {shortName(data.user.name)}
          </div>
          {/* Quick stats row */}
          <div style={{ display: 'flex', gap: 10 }}>
            {[
              { val: totalGroups, label: 'Gruppi', icon: 'fa-users' },
              { val: totalMatches, label: 'Partite', icon: 'fa-futbol' },
              { val: totalGoals, label: 'Gol', icon: 'fa-circle-dot' },
            ].map(s => (
              <div key={s.label} style={{
                flex: 1, background: 'rgba(255,255,255,.12)', borderRadius: 12,
                padding: '10px 8px', textAlign: 'center', backdropFilter: 'blur(8px)',
              }}>
                <i className={`fas ${s.icon}`} style={{ fontSize: 16, color: T.gold, marginBottom: 4, display: 'block' }} />
                <div style={{ fontWeight: 900, fontSize: 22 }}>{s.val}</div>
                <div style={{ fontSize: 10, opacity: 0.7, marginTop: 1 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{ padding: '20px 20px 20px' }}>
        {/* Prossima partita */}
        {upcoming.length > 0 && (
          <>
            <div style={{ fontWeight: 800, fontSize: 13, color: T.sub, textTransform: 'uppercase', letterSpacing: 1.2, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 6 }}>
              <i className="fas fa-calendar-day" style={{ color: T.primary }} /> Prossima Partita
            </div>
            {upcoming.slice(0, 1).map(m => (
              <div key={m.id} onClick={() => push('matchDetail', { match: m, groupId: m.groupId })}
                style={{
                  background: `linear-gradient(135deg, ${T.primary}22, ${T.primaryDark}11)`,
                  border: `1px solid ${T.primary}40`, borderRadius: 20,
                  padding: 18, marginBottom: 20, cursor: 'pointer',
                  boxShadow: `0 4px 24px ${T.primaryGlow}`,
                }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                  <Pill label={m.status === 'live' ? '🔴 LIVE' : '📅 ' + fmtDate(m.date)} color={m.status === 'live' ? T.danger : T.primary} />
                  <span style={{ color: T.sub, fontSize: 13 }}>{m.time}</span>
                </div>
                <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 4 }}>{m.groupName}</div>
                <div style={{ color: T.sub, fontSize: 13, marginBottom: 14 }}>
                  <i className="fas fa-location-dot" style={{ marginRight: 5, color: T.primary }} />{m.location}
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <Btn small label="Dettagli" iconFa="fa-circle-info" onClick={e => { e.stopPropagation(); push('matchDetail', { match: m, groupId: m.groupId }); }} />
                  {m.status !== 'live' && m.teamA.length > 0 &&
                    <Btn small label="Live" iconFa="fa-circle-play" danger onClick={e => { e.stopPropagation(); push('live', { match: m, groupId: m.groupId }); }} />
                  }
                </div>
              </div>
            ))}
          </>
        )}

        {/* Ultime partite */}
        {recent.length > 0 && (
          <>
            <div style={{ fontWeight: 800, fontSize: 13, color: T.sub, textTransform: 'uppercase', letterSpacing: 1.2, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 6 }}>
              <i className="fas fa-clock-rotate-left" style={{ color: T.primary }} /> Ultime Partite
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {recent.map(m => (
                <Card key={m.id} onClick={() => push('matchDetail', { match: m })}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 15 }}>{m.groupName}</div>
                      <div style={{ color: T.sub, fontSize: 12, marginTop: 2 }}>{fmtDate(m.date)}</div>
                    </div>
                    <div style={{ fontWeight: 900, fontSize: 22 }}>
                      <span style={{ color: T.teamA }}>{m.scoreA}</span>
                      <span style={{ color: T.sub, margin: '0 8px' }}>–</span>
                      <span style={{ color: T.teamB }}>{m.scoreB}</span>
                    </div>
                  </div>
                </Card>
              ))}
            </div>
          </>
        )}

        {upcoming.length === 0 && recent.length === 0 && (
          <div style={{ textAlign: 'center', color: T.sub, marginTop: 60 }}>
            <i className="fas fa-futbol" style={{ fontSize: 52, opacity: 0.25, display: 'block', marginBottom: 16 }} />
            <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 8 }}>Inizia adesso!</div>
            <div style={{ fontSize: 14 }}>Crea un gruppo e programma la prima partita.</div>
          </div>
        )}
      </div>
    </Screen>
  );
}

// ── CREATE MATCH ──────────────────────────────────────────────────────────
function CreateMatchScreen({ groupId, matchToEdit = null }) {
  const { data, setData, pop, push } = useApp();
  const group = data.groups.find(g => g.id === groupId);
  const [step, setStep] = useState(1); // 1=info, 2=players, 3=teams
  const [info, setInfo] = useState(matchToEdit ? {
    date: matchToEdit.date,
    time: matchToEdit.time,
    location: matchToEdit.location,
    duration: String(matchToEdit.duration || 60)
  } : { date: '', time: '21:00', location: '', duration: '60' });

  const [selected, setSelected] = useState(() => {
    if (matchToEdit) {
      const s = {};
      matchToEdit.players.forEach(p => { s[p.id] = true; });
      return s;
    }
    return {};
  });

  const [teamA, setTeamA] = useState(matchToEdit ? matchToEdit.teamA : []);
  const [teamB, setTeamB] = useState(matchToEdit ? matchToEdit.teamB : []);
  const [swapSelection, setSwapSelection] = useState(null); // { player, team }

  const presentPlayers = group.players.filter(p => selected[p.id]);

  const randomTeams = () => {
    const shuffled = shuffle(presentPlayers);
    const half = Math.ceil(shuffled.length / 2);
    setTeamA(shuffled.slice(0, half));
    setTeamB(shuffled.slice(half));
  };

  const moveToTeam = (player, team) => {
    setTeamA(prev => team === 'A' ? [...prev.filter(p => p.id !== player.id), player] : prev.filter(p => p.id !== player.id));
    setTeamB(prev => team === 'B' ? [...prev.filter(p => p.id !== player.id), player] : prev.filter(p => p.id !== player.id));
    setSwapSelection(null);
  };

  const handlePlayerTap = (player, team) => {
    if (!swapSelection) {
      // Prima selezione
      setSwapSelection({ player, team });
    } else if (swapSelection.player.id === player.id) {
      // Deseleziona
      setSwapSelection(null);
    } else {
      // Seconda selezione: scambia i due giocatori tra squadre
      const p1 = swapSelection.player, t1 = swapSelection.team;
      const p2 = player, t2 = team;
      setTeamA(prev => {
        let next = prev.filter(p => p.id !== p1.id && p.id !== p2.id);
        if (t2 === 'A') next = [...next, p1]; // p1 va in A (dove stava p2)
        if (t1 === 'A') next = [...next, p2]; // p2 va in A (dove stava p1)
        return next;
      });
      setTeamB(prev => {
        let next = prev.filter(p => p.id !== p1.id && p.id !== p2.id);
        if (t2 === 'B') next = [...next, p1];
        if (t1 === 'B') next = [...next, p2];
        return next;
      });
      setSwapSelection(null);
    }
  };

  const save = () => {
    const matchData = {
      ...info, duration: parseInt(info.duration),
      players: group.players.filter(p => selected[p.id]).map(p => ({ ...p, presence: 'present' })),
      teamA, teamB,
    };

    if (matchToEdit) {
      setData(prev => ({
        ...prev,
        groups: prev.groups.map(g => g.id === groupId ? {
          ...g,
          matches: g.matches.map(m => m.id === matchToEdit.id ? { ...m, ...matchData } : m)
        } : g)
      }));
      pop();
    } else {
      const newMatch = {
        id: Date.now(), ...matchData,
        status: 'upcoming',
        goals: [], scoreA: 0, scoreB: 0,
      };
      setData(prev => {
        const newData = {
          ...prev,
          groups: prev.groups.map(g => g.id === groupId ? { ...g, matches: [...g.matches, newMatch] } : g)
        };
        // Send Telegram convocations if enabled
        if (prev.telegramConfig?.enabled && prev.telegramConfig?.token) {
          const grp = prev.groups.find(g => g.id === groupId);
          const text = buildConvocazioneText(newMatch, grp?.name || '');
          const playersWithTg = matchData.players.filter(p => p.telegram);
          playersWithTg.forEach(p => {
            sendTelegramMsg(prev.telegramConfig.token, p.telegram, text);
          });
          if (playersWithTg.length > 0) showToast(`Convocazioni inviate a ${playersWithTg.length} giocatori via Telegram!`);
        }
        return newData;
      });
      pop(); pop();
    }
  };

  return (
    <Screen>
      <Header title={matchToEdit ? (step === 1 ? 'Modifica Partita' : step === 2 ? 'Modifica Giocatori' : 'Modifica Squadre') : (step === 1 ? 'Nuova Partita' : step === 2 ? 'Giocatori' : 'Squadre')} back />
      <div style={{ padding: 20 }}>
        {/* Step indicator */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 24 }}>
          {[1, 2, 3].map(s => (
            <div key={s} style={{
              height: 4, flex: 1, borderRadius: 2,

    data.groups.forEach(g => {

          const myPlayer = data.user.id !== 'admin' ? m.players.find(p => p.id === data.user.id) : null;
          
          if (data.user.id === 'admin' || myPlayer) {
            list.push({
              id: m.id,
              groupId: g.id,
              groupName: g.name,
              date: m.date,
              time: m.time,
              location: m.location,
              status: myPlayer ? (myPlayer.presence === 'present' ? 'accepted' : (myPlayer.presence === 'absent' ? 'declined' : 'pending')) : 'pending',

// ── LIVE SCREEN ───────────────────────────────────────────────────────────
function LiveScreen({ match: initialMatch, groupId }) {
  const { data, setData, pop, push } = useApp();

  const getMatch = () => {
    const g = data.groups.find(g => g.id === groupId);
    return g?.matches.find(m => m.id === initialMatch.id) || initialMatch;
  };

  const [elapsed, setElapsed] = useState(0);
  const [totalSecs, setTotalSecs] = useState((initialMatch.duration || 60) * 60);
  const [running, setRunning] = useState(false);
  const [keeperPause, setKeeperPause] = useState(false);
  const [keeperCountdown, setKeeperCountdown] = useState(20);
  const [goals, setGoals] = useState(initialMatch.goals || []);
  const [scoreA, setScoreA] = useState(initialMatch.scoreA || 0);
  const [scoreB, setScoreB] = useState(initialMatch.scoreB || 0);
  const [lastGoal, setLastGoal] = useState(null);
  const [activeTab, setActiveTab] = useState('A');
  const [selectingAssist, setSelectingAssist] = useState(null); // { player, team }
  const [editingGoal, setEditingGoal] = useState(null); // goal index
  const [isWide, setIsWide] = useState(window.innerWidth > 700);

  // ── VOICE COMMANDS ──────────────────────────────────────────────────────
  const [voiceActive, setVoiceActive] = useState(false);
  const [voiceStatus, setVoiceStatus] = useState(''); // feedback testuale
  const [voiceGoalPending, setVoiceGoalPending] = useState(null); // { player, team } in attesa di conferma
  const recognitionRef = useRef(null);
  const voiceStatusTimerRef = useRef(null);

  const allPlayers = useMemo(() => [...(initialMatch.teamA || []), ...(initialMatch.teamB || [])], [initialMatch]);

  // Similarità Levenshtein semplificata per nome
  const levenshtein = (a, b) => {
    const m = a.length, n = b.length;
    const dp = Array.from({ length: m + 1 }, (_, i) => Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0));
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  };

  const findPlayer = (spoken) => {
    if (!spoken) return null;
    const s = spoken.toLowerCase().trim();
    let best = null, bestScore = Infinity;
    for (const p of allPlayers) {
      const firstName = p.name.split(' ')[0].toLowerCase();
      const fullName = p.name.toLowerCase();
      // Match esatto o contenuto nel testo
      if (fullName.includes(s) || s.includes(firstName)) return p;
      // Levenshtein sul primo nome
      const dist = levenshtein(s, firstName);
      const threshold = Math.max(2, Math.floor(firstName.length / 3));
      if (dist <= threshold && dist < bestScore) { bestScore = dist; best = p; }
    }
    return best;
  };

  const showVoiceStatus = (msg, duration = 3000) => {
    setVoiceStatus(msg);
    clearTimeout(voiceStatusTimerRef.current);
    voiceStatusTimerRef.current = setTimeout(() => setVoiceStatus(''), duration);
  };

  const processVoiceCommand = useCallback((transcript) => {
    const text = transcript.toLowerCase().trim();
    console.log('[VOICE]', text);

    // ANNULLA
    if (text.includes('annulla') || text.includes('cancella') || text.includes('undo')) {
      undoGoal();
      showVoiceStatus('↩ Ultimo gol annullato');
      return;
    }
    // PAUSA / RIPRENDI / AVVIA
    if (text.includes('pausa') || text.includes('stop')) {
      setRunning(false);
      showVoiceStatus('⏸ Partita in pausa');
      return;
    }
    if (text.includes('riprendi') || text.includes('avvia') || text.includes('inizia') || text.includes('play')) {
      setRunning(true);
      showVoiceStatus('▶ Partita ripresa');
      return;
    }
    // FINE PARTITA
    if (text.includes('fine partita') || text.includes('termina partita') || text.includes('finisci partita')) {
      endMatch();
      return;
    }

    // GOL — pattern: "gol [nome]" oppure "gol [nome] assist [nome]"
    const golMatch = text.match(/gol\s+(.+?)(?:\s+assist\s+(.+))?$/);
    if (golMatch) {
      const scorerName = golMatch[1]?.replace(/\s+assist.*$/, '').trim();
      const assistName = golMatch[2]?.trim() || null;

      const scorer = findPlayer(scorerName);
      if (!scorer) {
        showVoiceStatus(`❓ Giocatore "${scorerName}" non trovato`);
        return;
      }
      const team = (initialMatch.teamA || []).find(p => p.id === scorer.id) ? 'A' : 'B';

      if (assistName) {
        const assistant = findPlayer(assistName);
        if (assistant && assistant.id !== scorer.id) {
          addGoal(scorer, team, assistant.id);
          showVoiceStatus(`⚽ Gol di ${scorer.name.split(' ')[0]}! Assist: ${assistant.name.split(' ')[0]}`);
        } else {
          addGoal(scorer, team, null);
          showVoiceStatus(`⚽ Gol di ${scorer.name.split(' ')[0]}! (assist non trovato)`);
        }
      } else {
        // Apre la modale assist normale
        setSelectingAssist({ player: scorer, team });
        showVoiceStatus(`⚽ Gol di ${scorer.name.split(' ')[0]} — chi ha assistito?`, 8000);
      }
      return;
    }

    // ASSIST (dopo aver aperto la modale): "assist [nome]" o solo "[nome]" se modale aperta
    if (text.startsWith('assist ') || text.startsWith('passaggio ')) {
      const assistName = text.replace(/^(assist|passaggio)\s+/, '');
      if (voiceGoalPending) {
        const assistant = findPlayer(assistName);
        addGoal(voiceGoalPending.player, voiceGoalPending.team, assistant?.id || null);
        setVoiceGoalPending(null);
        showVoiceStatus(`✅ Registrato con assist di ${assistant?.name.split(' ')[0] || '—'}`);
      }
      return;
    }

    showVoiceStatus(`🎤 "${transcript}" — non riconosciuto`);
  }, [allPlayers, initialMatch, undoGoal, addGoal, endMatch]);

  const startVoice = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      showVoiceStatus('❌ Riconoscimento vocale non supportato', 4000);
      return;
    }
    if (recognitionRef.current) {
      recognitionRef.current.stop();
      recognitionRef.current = null;
      setVoiceActive(false);
      setVoiceStatus('');
      return;
    }
    const rec = new SR();
    rec.lang = 'it-IT';
    rec.continuous = true;
    rec.interimResults = false;
    rec.maxAlternatives = 3;
    rec.onstart = () => { setVoiceActive(true); showVoiceStatus('🎤 In ascolto...', 99999); };
    rec.onresult = (e) => {
      const results = Array.from(e.results).slice(e.resultIndex);
      const transcript = results.map(r => r[0].transcript).join(' ');
      processVoiceCommand(transcript);
    };
    rec.onerror = (e) => {
      if (e.error !== 'no-speech') showVoiceStatus(`⚠️ Errore: ${e.error}`, 4000);
    };
    rec.onend = () => {
      setVoiceActive(false);
      recognitionRef.current = null;
      setVoiceStatus('');
    };
    recognitionRef.current = rec;
    rec.start();
  }, [processVoiceCommand]);

  // Cleanup voice on unmount
  useEffect(() => {
    return () => {
      recognitionRef.current?.stop();
      clearTimeout(voiceStatusTimerRef.current);
    };
  }, []);

  useEffect(() => {
    const handleResize = () => setIsWide(window.innerWidth > 700);
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  const KEEPER_INTERVAL = 360; // 6 min
  const prevKeeperRef = useRef(0);
  const keeperRef = useRef(false);
  const keeperTimerRef = useRef(null);

  // Main game timer
  useEffect(() => {
    if (!running || keeperPause) return;
    const interval = setInterval(() => {
      setElapsed(prev => {
        const next = prev + 1;
        // Check keeper change
        const currentPeriod = Math.floor(next / KEEPER_INTERVAL);
        const prevPeriod = Math.floor(prev / KEEPER_INTERVAL);
        if (currentPeriod > prevPeriod && next > 0 && !keeperRef.current) {
          keeperRef.current = true;
          setRunning(false);
          setKeeperPause(true);
          setKeeperCountdown(20);
          playKeeperSound();
        }
        if (next >= totalSecs) { setRunning(false); return totalSecs; }
        return next;
      });
    }, 1000);
    return () => clearInterval(interval);
  }, [running, keeperPause, totalSecs]);

  // Keeper pause countdown — bip ogni 5 secondi
  useEffect(() => {
    if (!keeperPause) return;
    keeperTimerRef.current = setInterval(() => {
      setKeeperCountdown(prev => {
        const next = prev - 1;
        if (next <= 0) {
          clearInterval(keeperTimerRef.current);
          setKeeperPause(false);
          keeperRef.current = false;
          setRunning(true);
          return 20;
        }
        // Bip ogni 5 secondi (15, 10, 5) e doppio bip all'ultimo secondo
        if (next % 5 === 0) playCountdownBeep();
        if (next === 1) setTimeout(playCountdownBeep, 300);
        return next;
      });
    }, 1000);
    return () => clearInterval(keeperTimerRef.current);
  }, [keeperPause]);

  const addGoal = (player, team, assistantId = null) => {
    const minute = Math.floor(elapsed / 60);
    const goal = { id: Date.now(), playerId: player.id, team, minute, assistantId };
    const newGoals = [...goals, goal];
    setGoals(newGoals);
    
    let newScoreA = scoreA, newScoreB = scoreB;
    if (team === 'A') { setScoreA(s => s + 1); newScoreA++; }
    else { setScoreB(s => s + 1); newScoreB++; }
    
    setLastGoal({ name: player.name, team, minute });
    playGoalSound();
    setTimeout(() => setLastGoal(null), 3000);

    // Save to data
    setData(prev => ({
      ...prev,
      groups: prev.groups.map(g => g.id === groupId ? {
        ...g,
        matches: g.matches.map(m => m.id === initialMatch.id ? {
          ...m, goals: newGoals,
          scoreA: newScoreA, scoreB: newScoreB,
        } : m)
      } : g)
    }));
    setSelectingAssist(null);
  };

  const removeGoal = (index) => {
    const goalToRemove = goals[index];
    const newGoals = goals.filter((_, i) => i !== index);
    setGoals(newGoals);
    
    let newScoreA = scoreA, newScoreB = scoreB;
    if (goalToRemove.team === 'A') { setScoreA(s => Math.max(0, s - 1)); newScoreA--; }
    else { setScoreB(s => Math.max(0, s - 1)); newScoreB--; }

    setData(prev => ({
      ...prev,
      groups: prev.groups.map(g => g.id === groupId ? {
        ...g,
        matches: g.matches.map(m => m.id === initialMatch.id ? {
          ...m, goals: newGoals,
          scoreA: Math.max(0, newScoreA), scoreB: Math.max(0, newScoreB),
        } : m)
      } : g)
    }));
    setEditingGoal(null);
  };

  const undoGoal = () => {
    if (goals.length === 0) return;
    const last = goals[goals.length - 1];
    const newGoals = goals.slice(0, -1);
    setGoals(newGoals);
    if (last.team === 'A') setScoreA(s => Math.max(0, s - 1));
    else setScoreB(s => Math.max(0, s - 1));
    setData(prev => ({
      ...prev,
      groups: prev.groups.map(g => g.id === groupId ? {
        ...g,
        matches: g.matches.map(m => m.id === initialMatch.id ? {
          ...m, goals: newGoals,
          scoreA: last.team === 'A' ? Math.max(0, (m.scoreA || 0) - 1) : (m.scoreA || 0),
          scoreB: last.team === 'B' ? Math.max(0, (m.scoreB || 0) - 1) : (m.scoreB || 0),
        } : m)
      } : g)
    }));
  };

  const endMatch = () => {
    setRunning(false);
    const finalMatch = { ...getMatch(), status: 'finished', goals, scoreA, scoreB };
    setData(prev => {
      const newData = {
        ...prev,
        groups: prev.groups.map(g => g.id === groupId ? {
          ...g,
          matches: g.matches.map(m => m.id === initialMatch.id ? finalMatch : m)
        } : g)
      };
      // Send Telegram result if enabled
      if (prev.telegramConfig?.enabled && prev.telegramConfig?.token) {
        const grp = prev.groups.find(g => g.id === groupId);
        const text = buildRisultatoText(finalMatch, grp?.name || '');
        const playersWithTg = finalMatch.players.filter(p => p.telegram);
        playersWithTg.forEach(p => sendTelegramMsg(prev.telegramConfig.token, p.telegram, text));
      }
      return newData;
    });
    push('matchResult', { match: finalMatch, groupId });
  };

  const remaining = totalSecs - elapsed;
  const progress = elapsed / totalSecs;
  const teamAPlayers = initialMatch.teamA || [];
  const teamBPlayers = initialMatch.teamB || [];

  // Per-player goal counts
  const playerGoals = {};
  goals.forEach(g => { playerGoals[g.playerId] = (playerGoals[g.playerId] || 0) + 1; });

  return (
    <Screen style={{ position: 'relative' }}>
      {/* Keeper Pause Overlay */}
      {keeperPause && (
        <div style={{
          position: 'absolute', inset: 0, zIndex: 50, background: 'rgba(0,0,0,.88)',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          backdropFilter: 'blur(6px)',
        }}>
          <div style={{ fontSize: 64, marginBottom: 16 }}>🥅</div>
          <div style={{ fontWeight: 900, fontSize: 28, color: T.warn, marginBottom: 8, textAlign: 'center' }}>CAMBIO PORTIERE</div>
          <div style={{ color: T.sub, fontSize: 16, marginBottom: 30 }}>Pausa di 20 secondi</div>
          <div style={{
            width: 90, height: 90, borderRadius: '50%',
            border: `4px solid ${T.warn}`, display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <span style={{ fontWeight: 900, fontSize: 36, color: T.warn }}>{keeperCountdown}</span>
          </div>
          <div style={{ color: T.sub, fontSize: 13, marginTop: 16 }}>Ripresa automatica...</div>
        </div>
      )}

      {/* Goal Toast */}
      {lastGoal && (
        <div style={{
          position: 'absolute', top: 16, left: '50%', transform: 'translateX(-50%)',
          background: lastGoal.team === 'A' ? T.teamA : T.teamB,
          color: '#fff', borderRadius: 20, padding: '10px 20px', fontWeight: 700,
          fontSize: 14, zIndex: 40, whiteSpace: 'nowrap', boxShadow: '0 4px 20px rgba(0,0,0,.4)',
          animation: 'none',
        }}>
          ⚽ GOL! {lastGoal.name} ({lastGoal.minute}')
        </div>
      )}

      <Header title="Partita Live 🔴" back />
      <div className="live-landscape" style={{ padding: '12px 20px 80px', display: 'flex', flexDirection: 'column', gap: 0 }}>
        {/* Score + Timer */}
        <Card className="live-scorebar" style={{ background: T.accentDim, border: `1px solid ${T.accent}30`, marginBottom: 16, textAlign: 'center' }}>
          {/* Score */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 24, marginBottom: 14 }}>
            <div>
              <div style={{ color: T.teamA, fontWeight: 700, fontSize: 12, marginBottom: 4 }}>SQUADRA A</div>
              <div style={{ fontWeight: 900, fontSize: 56, color: T.teamA, lineHeight: 1 }}>{scoreA}</div>
            </div>
            <div style={{ color: T.muted, fontWeight: 900, fontSize: 32 }}>–</div>
            <div>
              <div style={{ color: T.teamB, fontWeight: 700, fontSize: 12, marginBottom: 4 }}>SQUADRA B</div>
              <div style={{ fontWeight: 900, fontSize: 56, color: T.teamB, lineHeight: 1 }}>{scoreB}</div>
            </div>
          </div>

          {/* Timer */}
          <div style={{ fontWeight: 900, fontSize: 42, fontVariantNumeric: 'tabular-nums', color: remaining < 300 ? T.danger : T.text, marginBottom: 8 }}>
            {fmt(remaining)}
          </div>

          {/* Progress bar */}
          <div style={{ height: 6, background: T.border, borderRadius: 3, marginBottom: 14, overflow: 'hidden' }}>
            <div style={{ height: '100%', width: `${progress * 100}%`, background: T.accent, borderRadius: 3, transition: 'width .5s linear' }} />
          </div>

          {/* Next keeper change indicator */}
          <div style={{ color: T.sub, fontSize: 12, marginBottom: 14 }}>
            🥅 Prossimo cambio portiere: {fmt(KEEPER_INTERVAL - (elapsed % KEEPER_INTERVAL))}
          </div>

          {/* Controls */}
          <div style={{ display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
            <button onClick={() => setRunning(r => !r)} disabled={keeperPause || elapsed >= totalSecs} style={{
              background: running ? T.warn + '33' : T.accent,
              color: running ? T.warn : '#000',
              border: `2px solid ${running ? T.warn : T.accent}`,
              borderRadius: 40, padding: '10px 24px', fontWeight: 800, fontSize: 15,
              opacity: (keeperPause || elapsed >= totalSecs) ? 0.5 : 1,
            }}>
              {running ? '⏸ Pausa' : elapsed === 0 ? '▶ Avvia' : '▶ Riprendi'}
            </button>
            <button onClick={undoGoal} disabled={goals.length === 0} style={{
              background: T.card, color: T.danger, border: `1px solid ${T.danger}40`,
              borderRadius: 40, padding: '10px 16px', fontWeight: 700, fontSize: 13,
              opacity: goals.length === 0 ? 0.4 : 1,
            }}>↩ Annulla</button>
            <button onClick={endMatch} style={{
              background: T.danger + '22', color: T.danger, border: `1px solid ${T.danger}40`,
              borderRadius: 40, padding: '10px 16px', fontWeight: 700, fontSize: 13,
            }}>■ Fine</button>
            <button onClick={() => setTotalSecs(s => s + 360)} style={{
              background: T.warn + '22', color: T.warn, border: `1px solid ${T.warn}40`,
              borderRadius: 40, padding: '10px 16px', fontWeight: 700, fontSize: 13,
            }}>+6'</button>
            <button onClick={startVoice} title={voiceActive ? 'Ferma ascolto vocale' : 'Attiva comandi vocali'} style={{
              background: voiceActive ? '#e53935' : 'rgba(229,57,53,.15)',
              color: voiceActive ? '#fff' : '#e53935',
              border: '2px solid #e53935',
              borderRadius: 40, padding: '10px 18px', fontWeight: 800, fontSize: 18,
              boxShadow: voiceActive ? '0 0 0 4px rgba(229,57,53,.25)' : 'none',
              transition: 'all .2s',
            }}>🎤</button>
          </div>
          {voiceStatus ? (
            <div style={{
              marginTop: 12, background: voiceActive ? 'rgba(229,57,53,.18)' : 'rgba(0,230,118,.12)',
              border: '1px solid ' + (voiceActive ? 'rgba(229,57,53,.4)' : 'rgba(0,230,118,.4)'),
              borderRadius: 12, padding: '8px 16px', fontSize: 13, fontWeight: 600,
              color: voiceActive ? '#ff8a80' : T.accent, textAlign: 'center',
            }}>{voiceStatus}</div>
          ) : null}
        </Card>

        {/* Voice Commands Help */}
        {voiceActive && (
          <div style={{
            background: 'rgba(229,57,53,.1)', border: '1px solid rgba(229,57,53,.35)',
            borderRadius: 14, padding: '12px 16px', marginBottom: 14,
          }}>
            <div style={{ color: '#ff8a80', fontWeight: 800, fontSize: 12, letterSpacing: 1, marginBottom: 8 }}>🎤 COMANDI VOCALI ATTIVI</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4, fontSize: 11, color: '#ccc' }}>
              {[
                ['"Gol Marco"', 'Segna gol + apre assist'],
                ['"Gol Marco assist Luca"', 'Gol + assist in un comando'],
                ['"Annulla"', 'Annulla ultimo gol'],
                ['"Pausa" / "Riprendi"', 'Controlla il timer'],
              ].map(([cmd, desc]) => (
                <div key={cmd} style={{ background: 'rgba(0,0,0,.25)', borderRadius: 8, padding: '5px 8px' }}>
                  <div style={{ color: '#ff8a80', fontWeight: 700 }}>{cmd}</div>
                  <div style={{ color: '#888', marginTop: 1 }}>{desc}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Team Tabs (Mobile Only) */}
        {!isWide && (
          <div style={{ display: 'flex', background: T.card, borderRadius: 14, padding: 4, marginBottom: 16, border: `1px solid ${T.border}` }}>
            <button onClick={() => setActiveTab('A')} style={{
              flex: 1, padding: '10px', borderRadius: 10, fontWeight: 800, fontSize: 13,
              background: activeTab === 'A' ? T.teamA : 'transparent',
              color: activeTab === 'A' ? '#fff' : T.sub, transition: 'all .2s'
            }}>SQUADRA A</button>
            <button onClick={() => setActiveTab('B')} style={{
              flex: 1, padding: '10px', borderRadius: 10, fontWeight: 800, fontSize: 13,
              background: activeTab === 'B' ? T.teamB : 'transparent',
              color: activeTab === 'B' ? '#fff' : T.sub, transition: 'all .2s'
            }}>SQUADRA B</button>
          </div>
        )}

        {/* Layout Condizionale: Desktop/Tablet vs Mobile */}
        <div style={{ 
          display: 'grid', 
          gridTemplateColumns: isWide ? '1fr 1fr' : '1fr', 
          gap: 20 
        }}>
          {/* Team A column */}
          {(isWide || activeTab === 'A') && (
            <div>
              <div style={{ color: T.teamA, fontWeight: 800, fontSize: 13, marginBottom: 10, display: isWide ? 'block' : 'none' }}>SQUADRA A</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {teamAPlayers.map(p => (
                  <button key={p.id} onClick={() => setSelectingAssist({ player: p, team: 'A' })} style={{
                    display: 'flex', alignItems: 'center', gap: 12, padding: '13px 16px',
                    borderRadius: 14, background: T.card, border: `1px solid ${T.border}`,
                    textAlign: 'left', width: '100%', cursor: 'pointer',
                    transition: 'transform .1s',
                  }}>
                    <Avatar name={p.name} size={36} color={T.teamA} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{p.name.split(' ')[0]}</div>
                    </div>
                    {playerGoals[p.id] > 0 && <span style={{ color: T.accent, fontWeight: 800 }}>⚽{playerGoals[p.id]}</span>}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Team B column */}
          {(isWide || activeTab === 'B') && (
            <div>
              <div style={{ color: T.teamB, fontWeight: 800, fontSize: 13, marginBottom: 10, display: isWide ? 'block' : 'none' }}>SQUADRA B</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {teamBPlayers.map(p => (
                  <button key={p.id} onClick={() => setSelectingAssist({ player: p, team: 'B' })} style={{
                    display: 'flex', alignItems: 'center', gap: 12, padding: '13px 16px',
                    borderRadius: 14, background: T.card, border: `1px solid ${T.border}`,
                    textAlign: 'left', width: '100%', cursor: 'pointer',
                    transition: 'transform .1s',
                  }}>
                    <Avatar name={p.name} size={36} color={T.teamB} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{p.name.split(' ')[0]}</div>
                    </div>
                    {playerGoals[p.id] > 0 && <span style={{ color: T.accent, fontWeight: 800 }}>⚽{playerGoals[p.id]}</span>}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Recent goals (Full width below) */}
        {goals.length > 0 && (
          <div style={{ marginTop: 24 }}>
            <div style={{ fontWeight: 700, fontSize: 12, color: T.sub, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Gol Recenti</div>
            <div style={{ display: 'grid', gridTemplateColumns: isWide ? '1fr 1fr' : '1fr', gap: isWide ? 20 : 0 }}>
              {[...goals].reverse().map((g, i) => {
                const idx = goals.length - 1 - i;
                const p = [...teamAPlayers, ...teamBPlayers].find(pl => pl.id === g.playerId);
                const ast = [...teamAPlayers, ...teamBPlayers].find(pl => pl.id === g.assistantId);
                return (
                  <div key={idx} onClick={() => setEditingGoal(idx)} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 0', borderBottom: `1px solid ${T.border}`, cursor: 'pointer' }}>
                    <span style={{ color: T.sub, fontSize: 12, width: 28 }}>{g.minute}'</span>
                    <span style={{ fontSize: 14 }}>⚽</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{shortName(p?.name)}</div>
                      {ast && <div style={{ fontSize: 10, color: T.sub }}>Assist: {shortName(ast.name)}</div>}
                    </div>
                    <Pill label={`Sqd ${g.team}`} color={g.team === 'A' ? T.teamA : T.teamB} />
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Assist Overlay */}
        {selectingAssist && (
          <div style={{ position: 'fixed', inset: 0, zIndex: 60, background: 'rgba(0,0,0,.9)', display: 'flex', alignItems: 'flex-end' }}>
            <div style={{ background: T.surf, width: '100%', borderRadius: '24px 24px 0 0', padding: 24, maxHeight: '80%', overflowY: 'auto' }}>
              <div style={{ fontWeight: 800, fontSize: 20, marginBottom: 4, color: T.accent }}>GOL DI {selectingAssist.player.name.toUpperCase()}! ⚽</div>
              <div style={{ color: T.sub, fontSize: 14, marginBottom: 20 }}>Chi ha fatto l'assist?</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 }}>
                {(selectingAssist.team === 'A' ? teamAPlayers : teamBPlayers)
                  .filter(p => p.id !== selectingAssist.player.id)
                  .map(p => (
                    <button key={p.id} onClick={() => addGoal(selectingAssist.player, selectingAssist.team, p.id)} style={{
                      background: T.card, border: `1px solid ${T.border}`, borderRadius: 12, padding: 12, textAlign: 'center'
                    }}>
                      <div style={{ fontWeight: 700, fontSize: 13 }}>{p.name.split(' ')[0]}</div>
                    </button>
                  ))}
                <button onClick={() => addGoal(selectingAssist.player, selectingAssist.team, null)} style={{
                  background: T.border, borderRadius: 12, padding: 12, textAlign: 'center', gridColumn: 'span 2'
                }}>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>Nessun Assist</div>
                </button>
              </div>
              <Btn full secondary label="Annulla Gol" danger onClick={() => setSelectingAssist(null)} />
            </div>
          </div>
        )}

        {/* Edit Goal Overlay */}
        {editingGoal !== null && (
          <div style={{ position: 'fixed', inset: 0, zIndex: 60, background: 'rgba(0,0,0,.8)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
            <Card style={{ width: '100%', maxWidth: 320 }}>
              <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 20, textAlign: 'center' }}>Modifica Gol</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                <Btn full danger label="Elimina Gol 🗑" onClick={() => removeGoal(editingGoal)} />
                <Btn full secondary label="Chiudi" onClick={() => setEditingGoal(null)} />
              </div>
            </Card>
          </div>
        )}
      </div>
    </Screen>
  );
}

// ── SHARE SCREEN ──────────────────────────────────────────────────────────
function ShareScreen({ match }) {
  const { pop } = useApp();
  const date = match.date ? fmtDate(match.date) : 'Oggi';
  
  return (
    <Screen style={{ background: '#000' }}>
      <Header title="Condividi Partita" back />
      <div id="share-card" style={{ padding: 24, background: 'linear-gradient(135deg, #080810 0%, #16162a 100%)', minHeight: '80%', display: 'flex', flexDirection: 'column', gap: 32, position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', top: -50, right: -50, width: 200, height: 200, background: T.accent, opacity: 0.05, borderRadius: '50%' }} />
        
        <div style={{ textAlign: 'center' }}>
          <div style={{ color: T.accent, fontWeight: 900, fontSize: 12, letterSpacing: 3, textTransform: 'uppercase', marginBottom: 8 }}>{match.groupName}</div>
          <div style={{ fontWeight: 900, fontSize: 32, lineHeight: 1.1, marginBottom: 8 }}>CONVOCAZIONI<br/>MATCH</div>
          <div style={{ color: T.sub, fontSize: 15 }}>{date} • {match.time}</div>
          <div style={{ color: T.accent, fontSize: 14, marginTop: 4 }}>📍 {match.location}</div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <div style={{ background: 'rgba(59, 130, 246, 0.1)', border: `1px solid ${T.teamA}40`, borderRadius: 20, padding: 16 }}>
            <div style={{ color: T.teamA, fontWeight: 900, fontSize: 12, marginBottom: 16, textAlign: 'center', letterSpacing: 1 }}>TEAM BLUE</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {match.teamA.map(p => (
