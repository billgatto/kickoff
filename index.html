<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kickoff</title>
<meta name="description" content="Gestisci le tue partite di calcetto">
<meta name="theme-color" content="#080810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kickoff">
<link rel="manifest" href="kickoff-manifest.json">
<link rel="apple-touch-icon" href="kickoff-icon-192.png">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; }
  body { background: #080810; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #f0f0f8; -webkit-font-smoothing: antialiased; overflow: hidden; }
  #root { display: flex; justify-content: center; align-items: center; }
  ::-webkit-scrollbar { width: 0; }
  input, button, textarea { font-family: inherit; }
  button { cursor: pointer; border: none; background: none; color: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext, useMemo } = React;

// ── THEME ──────────────────────────────────────────────────────────────────
const T = {
  bg: '#080810', surf: '#0f0f1e', card: '#16162a', border: '#222238',
  accent: '#00e676', accentDim: 'rgba(0,230,118,.14)',
  text: '#f0f0f8', sub: '#6868a0', muted: '#3a3a60',
  danger: '#ff4466', warn: '#ffaa00',
  teamA: '#3b82f6', teamB: '#f97316',
};

// ── AUDIO ──────────────────────────────────────────────────────────────────
const playBeep = (n = 1, freq = 880, vol = 0.5) => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < n; i++) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'square';
      const t = ctx.currentTime + i * 0.38;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      o.start(t); o.stop(t + 0.28);
    }
  } catch (e) {}
};
const playGoalSound = () => { playBeep(2, 660, 0.4); };

// Fischio prolungato per cambio portiere: 3 toni lunghi + vibrazione
const playKeeperSound = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Fischio: 3 toni da 0.7s con breve pausa
    [[0, 880, 0.7], [0.85, 880, 0.7], [1.7, 1100, 1.1]].forEach(([delay, freq, dur]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sine';
      const t = ctx.currentTime + delay;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.55, t + 0.04);
      g.gain.setValueAtTime(0.55, t + dur - 0.08);
      g.gain.linearRampToValueAtTime(0, t + dur);
      o.start(t); o.stop(t + dur);
    });
  } catch (e) {}
  // Vibrazione su mobile
  if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 600]);
};

// Bip breve per conto alla rovescia ogni 5 secondi
const playCountdownBeep = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 660; o.type = 'sine';
    const t = ctx.currentTime;
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.start(t); o.stop(t + 0.15);
  } catch (e) {}
};

// ── UTILS ──────────────────────────────────────────────────────────────────
const fmt = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
const initials = n => n.split(' ').map(x => x[0]).join('').toUpperCase().slice(0, 2);
const shuffle = a => [...a].sort(() => Math.random() - 0.5);
const fmtDate = d => { const dt = new Date(d); return dt.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' }); };

// ── DATA ───────────────────────────────────────────────────────────────────
const PLAYERS_POOL = [];

const INIT_DATA = {
  user: { id: 'admin', name: 'Amministratore', role: 'admin' },
  groups: [],
  convocazioni: [],
};

// ── CONTEXT ────────────────────────────────────────────────────────────────
const Ctx = createContext();
const useApp = () => useContext(Ctx);

// ── SHARED COMPONENTS ─────────────────────────────────────────────────────
const Avatar = ({ name, size = 36, bg = T.card, color = T.accent }) => (
  <div style={{
    width: size, height: size, borderRadius: '50%', background: bg,
    border: `1.5px solid ${color}30`, display: 'flex', alignItems: 'center',
    justifyContent: 'center', fontSize: size * 0.33, fontWeight: 700,
    color, flexShrink: 0, letterSpacing: '-0.5px',
  }}>{initials(name)}</div>
);

const Pill = ({ label, color = T.accent }) => (
  <span style={{
    background: color + '22', color, borderRadius: 20, padding: '2px 10px',
    fontSize: 11, fontWeight: 600, letterSpacing: 0.3,
  }}>{label}</span>
);

const Btn = ({ label, onClick, full, secondary, danger, small, icon }) => (
  <button onClick={onClick} style={{
    width: full ? '100%' : 'auto', padding: small ? '8px 16px' : '13px 24px',
    borderRadius: 12, fontWeight: 700, fontSize: small ? 13 : 15,
    background: danger ? T.danger : secondary ? T.border : T.accent,
    color: danger ? '#fff' : secondary ? T.text : '#000',
    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
    letterSpacing: 0.3, transition: 'opacity .15s',
  }}>{icon && <span>{icon}</span>}{label}</button>
);

const Divider = () => <div style={{ height: 1, background: T.border, margin: '4px 0' }} />;

const Screen = ({ children, style }) => (
  <div style={{ height: '100%', overflowY: 'auto', background: T.bg, ...style }}>{children}</div>
);

const Header = ({ title, back, action }) => {
  const { pop } = useApp();
  return (
    <div style={{
      padding: '56px 20px 16px', display: 'flex', alignItems: 'center',
      gap: 12, background: T.bg, position: 'sticky', top: 0, zIndex: 10,
      borderBottom: `1px solid ${T.border}`,
    }}>
      {back && (
        <button onClick={pop} style={{ color: T.accent, fontSize: 22, padding: '0 4px' }}>‹</button>
      )}
      <span style={{ fontWeight: 800, fontSize: 20, flex: 1 }}>{title}</span>
      {action}
    </div>
  );
};

const Card = ({ children, style, onClick }) => (
  <div onClick={onClick} style={{
    background: T.card, borderRadius: 16, padding: 16,
    border: `1px solid ${T.border}`, ...style,
    cursor: onClick ? 'pointer' : 'default',
  }}>{children}</div>
);

// ── HOME SCREEN ────────────────────────────────────────────────────────────
function HomeScreen() {
  const { data, push, setData } = useApp();
  const upcoming = data.groups.flatMap(g =>
    g.matches.filter(m => m.status === 'upcoming' || m.status === 'live')
      .map(m => ({ ...m, groupName: g.name, groupId: g.id }))
  ).sort((a, b) => a.date.localeCompare(b.date));
  const recent = data.groups.flatMap(g =>
    g.matches.filter(m => m.status === 'finished').map(m => ({ ...m, groupName: g.name }))
  ).slice(0, 3);

  return (
    <Screen>
      <div style={{ padding: '56px 20px 20px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
          <div>
            <div style={{ color: T.sub, fontSize: 13, marginBottom: 4 }}>Ciao,</div>
            <div style={{ fontWeight: 800, fontSize: 26 }}>{data.user.name.split(' ')[0]} 👋</div>
          </div>
          <Avatar name={data.user.name} size={44} />
        </div>

        {/* Stats strip */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 28 }}>
          {[
            { label: 'Partite', val: 0 },
            { label: 'Gol', val: 0 },
            { label: 'Vittorie', val: 0 },
          ].map(s => (
            <Card key={s.label} style={{ textAlign: 'center', padding: '12px 8px' }}>
              <div style={{ fontWeight: 800, fontSize: 24, color: T.accent }}>{s.val}</div>
              <div style={{ color: T.sub, fontSize: 11, marginTop: 2 }}>{s.label}</div>
            </Card>
          ))}
        </div>

        {/* Prossima partita */}
        {upcoming.length > 0 && (
          <>
            <div style={{ fontWeight: 700, fontSize: 14, color: T.sub, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 12 }}>Prossima Partita</div>
            {upcoming.slice(0, 1).map(m => (
              <Card key={m.id} onClick={() => push('matchDetail', { match: m, groupId: m.groupId })} style={{ marginBottom: 20, background: T.accentDim, border: `1px solid ${T.accent}40` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
                  <Pill label={m.status === 'live' ? '🔴 LIVE' : '📅 ' + fmtDate(m.date)} color={m.status === 'live' ? T.danger : T.accent} />
                  <span style={{ color: T.sub, fontSize: 13 }}>{m.time}</span>
                </div>
                <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 4 }}>{m.groupName}</div>
                <div style={{ color: T.sub, fontSize: 13, marginBottom: 16 }}>📍 {m.location}</div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <Btn small label="Dettagli" onClick={(e) => { e.stopPropagation(); push('matchDetail', { match: m, groupId: m.groupId }); }} />
                  {m.status !== 'live' && m.teamA.length > 0 &&
                    <Btn small label="▶ Avvia Live" icon="🔴" onClick={(e) => { e.stopPropagation(); push('live', { match: m, groupId: m.groupId }); }} />
                  }
                </div>
              </Card>
            ))}
          </>
        )}

        {/* Ultime partite */}
        {recent.length > 0 && (
          <>
            <div style={{ fontWeight: 700, fontSize: 14, color: T.sub, letterSpacing: 1, textTransform: 'uppercase', marginBottom: 12 }}>Ultime Partite</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {recent.map(m => (
                <Card key={m.id} onClick={() => push('matchDetail', { match: m })}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 15 }}>{m.groupName}</div>
                      <div style={{ color: T.sub, fontSize: 12, marginTop: 2 }}>{fmtDate(m.date)}</div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontWeight: 800, fontSize: 20 }}>
                        <span style={{ color: T.teamA }}>{m.scoreA}</span>
                        <span style={{ color: T.sub, margin: '0 6px' }}>–</span>
                        <span style={{ color: T.teamB }}>{m.scoreB}</span>
                      </div>
                    </div>
                  </div>
                </Card>
              ))}
            </div>
          </>
        )}
      </div>
    </Screen>
  );
}

// ── GROUPS SCREEN ─────────────────────────────────────────────────────────
function GroupsScreen() {
  const { data, setData, push } = useApp();
  const [showCreate, setShowCreate] = useState(false);
  const [newName, setNewName] = useState('');

  const createGroup = () => {
    if (!newName.trim()) return;
    const group = { id: Date.now(), name: newName.trim(), emoji: '⚽', players: [], matches: [] };
    setData(prev => ({ ...prev, groups: [...prev.groups, group] }));
    setShowCreate(false);
    setNewName('');
    push('groupDetail', { groupId: group.id });
  };

  return (
    <Screen>
      <div style={{ padding: '56px 20px 20px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
          <span style={{ fontWeight: 800, fontSize: 24 }}>Gruppi</span>
          <button onClick={() => setShowCreate(true)} style={{
            background: T.accent, color: '#000', borderRadius: 20, padding: '6px 16px',
            fontWeight: 700, fontSize: 13,
          }}>+ Nuovo</button>
        </div>

        {data.groups.length === 0 && (
          <div style={{ textAlign: 'center', color: T.sub, marginTop: 60 }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>👥</div>
            <div>Nessun gruppo. Creane uno!</div>
          </div>
        )}

        {data.groups.map(g => (
          <Card key={g.id} onClick={() => push('groupDetail', { groupId: g.id })} style={{ marginBottom: 12 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <div style={{ width: 48, height: 48, borderRadius: 14, background: T.accentDim, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>
                {g.emoji}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 17 }}>{g.name}</div>
                <div style={{ color: T.sub, fontSize: 13, marginTop: 2 }}>{g.players.length} giocatori · {g.matches.length} partite</div>
              </div>
              <span style={{ color: T.sub, fontSize: 18 }}>›</span>
            </div>
          </Card>
        ))}

        {showCreate && (
          <div style={{
            position: 'fixed', inset: 0, background: 'rgba(0,0,0,.7)', display: 'flex',
            alignItems: 'flex-end', zIndex: 100, backdropFilter: 'blur(4px)',
          }} onClick={() => setShowCreate(false)}>
            <div onClick={e => e.stopPropagation()} style={{
              background: T.surf, borderRadius: '20px 20px 0 0', padding: 24, width: '100%',
            }}>
              <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 16 }}>Nuovo Gruppo</div>
              <input
                value={newName} onChange={e => setNewName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && createGroup()}
                placeholder="Nome del gruppo..."
                autoFocus
                style={{
                  width: '100%', background: T.card, border: `1px solid ${T.border}`,
                  borderRadius: 12, padding: '12px 16px', color: T.text, fontSize: 15,
                  marginBottom: 16, outline: 'none',
                }} />
              <Btn full label="Crea Gruppo" onClick={createGroup} />
            </div>
          </div>
        )}
      </div>
    </Screen>
  );
}

// ── GROUP DETAIL ──────────────────────────────────────────────────────────
function GroupDetailScreen({ groupId }) {
  const { data, setData, push } = useApp();
  const group = data.groups.find(g => g.id === groupId);
  const [tab, setTab] = useState('partite');
  const [showAddPlayer, setShowAddPlayer] = useState(false);
  const [newPlayerName, setNewPlayerName] = useState('');

  if (!group) return null;
  const upcoming = group.matches.filter(m => m.status === 'upcoming' || m.status === 'live');
  const finished = group.matches.filter(m => m.status === 'finished');

  const addPlayer = () => {
    if (!newPlayerName.trim()) return;
    const player = { id: Date.now(), name: newPlayerName.trim(), goals: 0, matches: 0, wins: 0 };
    setData(prev => ({
      ...prev,
      groups: prev.groups.map(g => g.id === groupId ? { ...g, players: [...g.players, player] } : g)
    }));
    setNewPlayerName('');
    setShowAddPlayer(false);
  };

  return (
    <Screen>
      <Header title={group.name} back action={
        <button onClick={() => push('createMatch', { groupId })} style={{ color: T.accent, fontWeight: 700, fontSize: 14 }}>+ Partita</button>
      } />
      <div style={{ padding: 20 }}>
        {/* Tabs */}
        <div style={{ display: 'flex', background: T.card, borderRadius: 12, padding: 4, marginBottom: 20 }}>
          {['partite', 'giocatori', 'statistiche'].map(t => (
            <button key={t} onClick={() => setTab(t)} style={{
              flex: 1, padding: '8px 0', borderRadius: 10, fontWeight: 700, fontSize: 13,
              background: tab === t ? T.accent : 'transparent',
              color: tab === t ? '#000' : T.sub, transition: 'all .2s',
            }}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>
          ))}
        </div>

        {tab === 'partite' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {upcoming.length === 0 && finished.length === 0 && (
              <div style={{ textAlign: 'center', color: T.sub, marginTop: 40 }}>
                <div style={{ fontSize: 40, marginBottom: 10 }}>📅</div>
                <div>Nessuna partita. Creane una!</div>
              </div>
            )}
            {upcoming.map(m => (
              <Card key={m.id} onClick={() => push('matchDetail', { match: m, groupId })} style={{ border: `1px solid ${T.accent}40` }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                  <Pill label={m.status === 'live' ? '🔴 LIVE' : '📅 Prossima'} color={m.status === 'live' ? T.danger : T.accent} />
                  <span style={{ color: T.sub, fontSize: 12 }}>{fmtDate(m.date)} · {m.time}</span>
                </div>
                <div style={{ color: T.sub, fontSize: 13 }}>📍 {m.location}</div>
                <div style={{ color: T.sub, fontSize: 13, marginTop: 4 }}>
                  👥 {m.players.filter(p => p.presence === 'present').length} presenti
                </div>
              </Card>
            ))}
            {finished.map(m => (
              <Card key={m.id} onClick={() => push('matchDetail', { match: m, groupId })}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{fmtDate(m.date)}</div>
                    <div style={{ color: T.sub, fontSize: 12, marginTop: 2 }}>{m.time}</div>
                  </div>
                  <div style={{ fontWeight: 800, fontSize: 22 }}>
                    <span style={{ color: T.teamA }}>{m.scoreA}</span>
                    <span style={{ color: T.muted, margin: '0 8px' }}>–</span>
                    <span style={{ color: T.teamB }}>{m.scoreB}</span>
                  </div>
                </div>
              </Card>
            ))}
          </div>
        )}

        {tab === 'giocatori' && (
          <>
            <button onClick={() => setShowAddPlayer(true)} style={{
              width: '100%', padding: '12px', borderRadius: 12, marginBottom: 12,
              background: T.accentDim, border: `1px dashed ${T.accent}60`,
              color: T.accent, fontWeight: 700, fontSize: 14,
            }}>+ Aggiungi Giocatore</button>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {group.players.length === 0 && (
                <div style={{ textAlign: 'center', color: T.sub, marginTop: 30 }}>
                  <div style={{ fontSize: 40, marginBottom: 10 }}>👤</div>
                  <div>Nessun giocatore. Aggiungine uno!</div>
                </div>
              )}
              {[...group.players].sort((a, b) => b.goals - a.goals).map((p, i) => (
                <Card key={p.id}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <span style={{ color: T.sub, fontSize: 13, width: 20, textAlign: 'center' }}>{i + 1}</span>
                    <Avatar name={p.name} size={38} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 15 }}>{p.name}</div>
                      <div style={{ color: T.sub, fontSize: 12 }}>{p.matches} partite · {p.wins} vittorie</div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontWeight: 800, fontSize: 18, color: T.accent }}>{p.goals}</div>
                      <div style={{ color: T.sub, fontSize: 10 }}>gol</div>
                    </div>
                  </div>
                </Card>
              ))}
            </div>
          </>
        )}

        {tab === 'statistiche' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {group.players.length === 0 ? (
              <div style={{ textAlign: 'center', color: T.sub, marginTop: 30 }}>Nessun dato ancora.</div>
            ) : (
              group.players
                .map(p => {
                  const playerGoals = group.matches.reduce((sum, m) => sum + m.goals.filter(g => g.playerId === p.id).length, 0);
                  const assists = group.matches.reduce((sum, m) => sum + m.goals.filter(g => g.assistantId === p.id).length, 0);
                  const matchesCount = group.matches.filter(m => m.status === 'finished' && [...m.teamA, ...m.teamB].some(pl => pl.id === p.id)).length;
                  const winsCount = group.matches.filter(m => {
                    if (m.status !== 'finished') return false;
                    const inA = m.teamA.some(pl => pl.id === p.id);
                    const inB = m.teamB.some(pl => pl.id === p.id);
                    if (inA && m.scoreA > m.scoreB) return true;
                    if (inB && m.scoreB > m.scoreA) return true;
                    return false;
                  }).length;
                  return { ...p, calcGoals: playerGoals, calcAssists: assists, calcMatches: matchesCount, calcWins: winsCount, winRate: matchesCount ? Math.round((winsCount / matchesCount) * 100) : 0 };
                })
                .sort((a, b) => b.calcGoals - a.calcGoals || b.calcAssists - a.calcAssists)
                .map((p, i) => (
                  <Card key={p.id}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <span style={{ color: T.sub, fontSize: 12, width: 18 }}>{i+1}</span>
                      <Avatar name={p.name} size={36} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>{p.name}</div>
                        <div style={{ color: T.sub, fontSize: 11 }}>{p.calcMatches} PT · {p.winRate}% WIN</div>
                      </div>
                      <div style={{ display: 'flex', gap: 12 }}>
                        <div style={{ textAlign: 'center' }}>
                          <div style={{ fontWeight: 800, fontSize: 16, color: T.accent }}>{p.calcGoals}</div>
                          <div style={{ color: T.sub, fontSize: 9, textTransform: 'uppercase' }}>Gol</div>
                        </div>
                        <div style={{ textAlign: 'center' }}>
                          <div style={{ fontWeight: 800, fontSize: 16, color: T.warn }}>{p.calcAssists}</div>

// ── CREATE MATCH ──────────────────────────────────────────────────────────
function CreateMatchScreen({ groupId }) {
  const { data, setData, pop, push } = useApp();
  const group = data.groups.find(g => g.id === groupId);
  const [step, setStep] = useState(1); // 1=info, 2=players, 3=teams
  const [info, setInfo] = useState({ date: '', time: '21:00', location: '', duration: '60' });
  const [selected, setSelected] = useState({});
  const [teamA, setTeamA] = useState([]);
  const [teamB, setTeamB] = useState([]);
  const [swapSelection, setSwapSelection] = useState(null); // { player, team }

  const presentPlayers = group.players.filter(p => selected[p.id]);

  const randomTeams = () => {
    const shuffled = shuffle(presentPlayers);
    const half = Math.ceil(shuffled.length / 2);
    setTeamA(shuffled.slice(0, half));
    setTeamB(shuffled.slice(half));
  };

  const moveToTeam = (player, team) => {
    setTeamA(prev => team === 'A' ? [...prev.filter(p => p.id !== player.id), player] : prev.filter(p => p.id !== player.id));
    setTeamB(prev => team === 'B' ? [...prev.filter(p => p.id !== player.id), player] : prev.filter(p => p.id !== player.id));
    setSwapSelection(null);
  };

  const handlePlayerTap = (player, team) => {
    if (!swapSelection) {
      // Prima selezione
      setSwapSelection({ player, team });
    } else if (swapSelection.player.id === player.id) {
      // Deseleziona
      setSwapSelection(null);
    } else {
      // Seconda selezione: scambia i due giocatori tra squadre
      const p1 = swapSelection.player, t1 = swapSelection.team;
      const p2 = player, t2 = team;
      setTeamA(prev => {
        let next = prev.filter(p => p.id !== p1.id && p.id !== p2.id);
        if (t2 === 'A') next = [...next, p1]; // p1 va in A (dove stava p2)
        if (t1 === 'A') next = [...next, p2]; // p2 va in A (dove stava p1)
        return next;
      });
      setTeamB(prev => {
        let next = prev.filter(p => p.id !== p1.id && p.id !== p2.id);
        if (t2 === 'B') next = [...next, p1];
        if (t1 === 'B') next = [...next, p2];
        return next;
      });
      setSwapSelection(null);
    }
  };

  const save = () => {
    const newMatch = {
      id: Date.now(), ...info, duration: parseInt(info.duration),
      status: 'upcoming',
      players: group.players.filter(p => selected[p.id]).map(p => ({ ...p, presence: 'present' })),
      teamA, teamB, goals: [], scoreA: 0, scoreB: 0,
    };
    setData(prev => ({
      ...prev,
      groups: prev.groups.map(g => g.id === groupId ? { ...g, matches: [...g.matches, newMatch] } : g)
    }));
    pop(); pop();
  };

  return (
    <Screen>
      <Header title={step === 1 ? 'Nuova Partita' : step === 2 ? 'Giocatori' : 'Squadre'} back />
      <div style={{ padding: 20 }}>
        {/* Step indicator */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 24 }}>
          {[1, 2, 3].map(s => (
            <div key={s} style={{
              height: 4, flex: 1, borderRadius: 2,
              background: s <= step ? T.accent : T.border, transition: 'background .3s',
            }} />
          ))}
        </div>

        {step === 1 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {[
              { key: 'date', label: 'Data', type: 'date' },
              { key: 'time', label: 'Orario', type: 'time' },
              { key: 'location', label: 'Campo / Luogo', type: 'text', placeholder: 'es. Centro Sportivo Aurora' },
              { key: 'duration', label: 'Durata (minuti)', type: 'number', placeholder: '60' },
            ].map(f => (
              <div key={f.key}>
                <div style={{ color: T.sub, fontSize: 12, fontWeight: 600, marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.8 }}>{f.label}</div>
                <input
                  type={f.type} value={info[f.key]} placeholder={f.placeholder}
                  onChange={e => setInfo(prev => ({ ...prev, [f.key]: e.target.value }))}
                  style={{
                    width: '100%', background: T.card, border: `1px solid ${T.border}`,
                    borderRadius: 12, padding: '12px 14px', color: T.text, fontSize: 15, outline: 'none',
                    colorScheme: 'dark',
                  }}
                />
              </div>
            ))}
            <Btn full label="Avanti →" onClick={() => setStep(2)} />
          </div>
        )}

        {step === 2 && (
          <>
            <div style={{ color: T.sub, fontSize: 13, marginBottom: 16 }}>Seleziona i giocatori presenti</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 20 }}>
              {group.players.map(p => (
                <div key={p.id} onClick={() => setSelected(prev => ({ ...prev, [p.id]: !prev[p.id] }))}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px',
                    borderRadius: 12, background: selected[p.id] ? T.accentDim : T.card,
                    border: `1px solid ${selected[p.id] ? T.accent : T.border}`, cursor: 'pointer', transition: 'all .15s',
                  }}>
                  <Avatar name={p.name} size={36} color={selected[p.id] ? T.accent : T.sub} />
                  <span style={{ flex: 1, fontWeight: 600 }}>{p.name}</span>
                  <div style={{
                    width: 20, height: 20, borderRadius: '50%',
                    background: selected[p.id] ? T.accent : 'transparent',
                    border: `2px solid ${selected[p.id] ? T.accent : T.muted}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: '#000', fontSize: 11, fontWeight: 800,
                  }}>{selected[p.id] ? '✓' : ''}</div>
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <Btn full secondary label="← Indietro" onClick={() => setStep(1)} />
              <Btn full label={`Avanti (${presentPlayers.length})`} onClick={() => { setStep(3); randomTeams(); }} />
            </div>
          </>
        )}

        {step === 3 && (
          <>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <span style={{ color: T.sub, fontSize: 13 }}>Organizza le squadre</span>
              <button onClick={() => { randomTeams(); setSwapSelection(null); }} style={{
                background: T.warn + '22', color: T.warn, borderRadius: 20, padding: '6px 14px',
                fontWeight: 700, fontSize: 12,
              }}>🔀 Random</button>
            </div>

            {/* Hint swap */}
            <div style={{
              background: swapSelection ? T.warn + '22' : T.card,
              border: `1px solid ${swapSelection ? T.warn : T.border}`,
              borderRadius: 10, padding: '8px 14px', marginBottom: 14,
              fontSize: 12, color: swapSelection ? T.warn : T.sub,
              display: 'flex', alignItems: 'center', gap: 8, transition: 'all .2s',
            }}>
              {swapSelection
                ? <>🔄 <strong style={{ color: T.warn }}>{swapSelection.player.name.split(' ')[0]}</strong> selezionato — tocca un altro giocatore per scambiarlo</>
                : <>💡 Tocca due giocatori per scambiarli di squadra</>}
            </div>

            {/* Unassigned */}
            {(() => {
              const assigned = [...teamA, ...teamB].map(p => p.id);
              const unassigned = presentPlayers.filter(p => !assigned.includes(p.id));
              return unassigned.length > 0 && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ color: T.sub, fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 8 }}>Non assegnati</div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                    {unassigned.map(p => (
                      <div key={p.id} style={{ display: 'flex', gap: 4 }}>
                        <button onClick={() => moveToTeam(p, 'A')} style={{ background: T.teamA + '33', color: T.teamA, borderRadius: 20, padding: '6px 10px', fontSize: 12, fontWeight: 600 }}>A</button>
                        <button style={{ background: T.card, borderRadius: 20, padding: '6px 10px', fontSize: 12, color: T.text, border: `1px solid ${T.border}` }}>{p.name.split(' ')[0]}</button>
                        <button onClick={() => moveToTeam(p, 'B')} style={{ background: T.teamB + '33', color: T.teamB, borderRadius: 20, padding: '6px 10px', fontSize: 12, fontWeight: 600 }}>B</button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}

            {/* Teams */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
              {[{ label: 'Squadra A', team: teamA, color: T.teamA, key: 'A' },
                { label: 'Squadra B', team: teamB, color: T.teamB, key: 'B' }].map(({ label, team, color, key }) => (
                <Card key={key} style={{ border: `1px solid ${color}40`, padding: 12 }}>
                  <div style={{ color, fontWeight: 700, fontSize: 13, marginBottom: 10 }}>{label} ({team.length})</div>
                  {team.map(p => {
                    const isSelected = swapSelection?.player.id === p.id;
                    return (
                      <div key={p.id}
                        onClick={() => handlePlayerTap(p, key)}
                        style={{
                          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                          marginBottom: 6, padding: '6px 8px', borderRadius: 8, cursor: 'pointer',
                          background: isSelected ? color + '33' : 'transparent',
                          border: `1px solid ${isSelected ? color : 'transparent'}`,
                          transition: 'all .15s',
                        }}>
                        <span style={{ fontSize: 13, fontWeight: isSelected ? 700 : 400, color: isSelected ? color : T.text }}>
                          {isSelected ? '→ ' : ''}{p.name.split(' ')[0]}
                        </span>
                        <button
                          onClick={e => { e.stopPropagation(); setTeamA(ta => ta.filter(x => x.id !== p.id)); setTeamB(tb => tb.filter(x => x.id !== p.id)); setSwapSelection(null); }}
                          style={{ color: T.muted, fontSize: 15, lineHeight: 1, padding: '0 2px' }}>×</button>
                      </div>
                    );
                  })}
                </Card>
              ))}
            </div>

            <div style={{ display: 'flex', gap: 10 }}>
              <Btn full secondary label="← Indietro" onClick={() => setStep(2)} />
              <Btn full label="Salva Partita ✓" onClick={save} />
            </div>
            {step === 3 && (
              <div style={{ marginTop: 12 }}>
                <Btn full secondary label="📢 Condividi Convocazioni" icon="📤" onClick={() => {
                  const match = { ...info, teamA, teamB, groupName: group.name };
                  push('share', { match });
                }} />
              </div>
            )}
          </>
        )}
      </div>
    </Screen>
  );
}

// ── LIVE SCREEN ───────────────────────────────────────────────────────────
function LiveScreen({ match: initialMatch, groupId }) {
  const { data, setData, pop } = useApp();

  const getMatch = () => {
    const g = data.groups.find(g => g.id === groupId);
    return g?.matches.find(m => m.id === initialMatch.id) || initialMatch;
  };

  const [elapsed, setElapsed] = useState(0);
  const [totalSecs, setTotalSecs] = useState((initialMatch.duration || 60) * 60);
  const [running, setRunning] = useState(false);
  const [keeperPause, setKeeperPause] = useState(false);
  const [keeperCountdown, setKeeperCountdown] = useState(20);
  const [goals, setGoals] = useState(initialMatch.goals || []);
  const [scoreA, setScoreA] = useState(initialMatch.scoreA || 0);
  const [scoreB, setScoreB] = useState(initialMatch.scoreB || 0);
  const [lastGoal, setLastGoal] = useState(null);
  const [activeTab, setActiveTab] = useState('A');
  const [selectingAssist, setSelectingAssist] = useState(null); // { player, team }
  const [editingGoal, setEditingGoal] = useState(null); // goal index
  const [isWide, setIsWide] = useState(window.innerWidth > 700);

  useEffect(() => {
    const handleResize = () => setIsWide(window.innerWidth > 700);
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  const KEEPER_INTERVAL = 360; // 6 min
  const prevKeeperRef = useRef(0);
  const keeperRef = useRef(false);
  const keeperTimerRef = useRef(null);

  // Main game timer
  useEffect(() => {
    if (!running || keeperPause) return;
    const interval = setInterval(() => {
      setElapsed(prev => {
        const next = prev + 1;
        // Check keeper change
        const currentPeriod = Math.floor(next / KEEPER_INTERVAL);
        const prevPeriod = Math.floor(prev / KEEPER_INTERVAL);
        if (currentPeriod > prevPeriod && next > 0 && !keeperRef.current) {
          keeperRef.current = true;
          setRunning(false);
          setKeeperPause(true);
          setKeeperCountdown(20);
          playKeeperSound();
        }
        if (next >= totalSecs) { setRunning(false); return totalSecs; }
        return next;
      });
    }, 1000);
    return () => clearInterval(interval);
  }, [running, keeperPause, totalSecs]);

  // Keeper pause countdown — bip ogni 5 secondi
  useEffect(() => {
    if (!keeperPause) return;
    keeperTimerRef.current = setInterval(() => {
      setKeeperCountdown(prev => {
        const next = prev - 1;
        if (next <= 0) {
          clearInterval(keeperTimerRef.current);
          setKeeperPause(false);
          keeperRef.current = false;
          setRunning(true);
          return 20;
        }
        // Bip ogni 5 secondi (15, 10, 5) e doppio bip all'ultimo secondo
        if (next % 5 === 0) playCountdownBeep();
        if (next === 1) setTimeout(playCountdownBeep, 300);
        return next;
      });
    }, 1000);
    return () => clearInterval(keeperTimerRef.current);
  }, [keeperPause]);

  const addGoal = (player, team, assistantId = null) => {
    const minute = Math.floor(elapsed / 60);
    const goal = { id: Date.now(), playerId: player.id, team, minute, assistantId };
    const newGoals = [...goals, goal];
    setGoals(newGoals);
    
    let newScoreA = scoreA, newScoreB = scoreB;
    if (team === 'A') { setScoreA(s => s + 1); newScoreA++; }
    else { setScoreB(s => s + 1); newScoreB++; }
    
    setLastGoal({ name: player.name, team, minute });
    playGoalSound();
    setTimeout(() => setLastGoal(null), 3000);

    // Save to data
    setData(prev => ({
      ...prev,
      groups: prev.groups.map(g => g.id === groupId ? {
        ...g,
        matches: g.matches.map(m => m.id === initialMatch.id ? {
          ...m, goals: newGoals,
          scoreA: newScoreA, scoreB: newScoreB,
        } : m)
      } : g)
    }));
    setSelectingAssist(null);
  };

  const removeGoal = (index) => {
    const goalToRemove = goals[index];
    const newGoals = goals.filter((_, i) => i !== index);
    setGoals(newGoals);
    
    let newScoreA = scoreA, newScoreB = scoreB;
    if (goalToRemove.team === 'A') { setScoreA(s => Math.max(0, s - 1)); newScoreA--; }
    else { setScoreB(s => Math.max(0, s - 1)); newScoreB--; }

    setData(prev => ({
      ...prev,
      groups: prev.groups.map(g => g.id === groupId ? {
        ...g,
        matches: g.matches.map(m => m.id === initialMatch.id ? {
          ...m, goals: newGoals,
          scoreA: Math.max(0, newScoreA), scoreB: Math.max(0, newScoreB),
        } : m)
      } : g)
    }));
    setEditingGoal(null);
  };

  const undoGoal = () => {
    if (goals.length === 0) return;
    const last = goals[goals.length - 1];
    const newGoals = goals.slice(0, -1);
    setGoals(newGoals);
    if (last.team === 'A') setScoreA(s => Math.max(0, s - 1));
    else setScoreB(s => Math.max(0, s - 1));
    setData(prev => ({
      ...prev,
      groups: prev.groups.map(g => g.id === groupId ? {
        ...g,
        matches: g.matches.map(m => m.id === initialMatch.id ? {
          ...m, goals: newGoals,
          scoreA: last.team === 'A' ? Math.max(0, (m.scoreA || 0) - 1) : (m.scoreA || 0),
          scoreB: last.team === 'B' ? Math.max(0, (m.scoreB || 0) - 1) : (m.scoreB || 0),
        } : m)
      } : g)
    }));
  };

  const endMatch = () => {
    setRunning(false);
    setData(prev => ({
      ...prev,
      groups: prev.groups.map(g => g.id === groupId ? {
        ...g,
        matches: g.matches.map(m => m.id === initialMatch.id ? { ...m, status: 'finished', goals, scoreA, scoreB } : m)
      } : g)
    }));
    pop();
  };

  const remaining = totalSecs - elapsed;
  const progress = elapsed / totalSecs;
  const teamAPlayers = initialMatch.teamA || [];
  const teamBPlayers = initialMatch.teamB || [];

  // Per-player goal counts
  const playerGoals = {};
  goals.forEach(g => { playerGoals[g.playerId] = (playerGoals[g.playerId] || 0) + 1; });

  return (
    <Screen style={{ position: 'relative' }}>
      {/* Keeper Pause Overlay */}
      {keeperPause && (
        <div style={{
          position: 'absolute', inset: 0, zIndex: 50, background: 'rgba(0,0,0,.88)',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          backdropFilter: 'blur(6px)',
        }}>
          <div style={{ fontSize: 64, marginBottom: 16 }}>🥅</div>
          <div style={{ fontWeight: 900, fontSize: 28, color: T.warn, marginBottom: 8, textAlign: 'center' }}>CAMBIO PORTIERE</div>
          <div style={{ color: T.sub, fontSize: 16, marginBottom: 30 }}>Pausa di 20 secondi</div>
          <div style={{
            width: 90, height: 90, borderRadius: '50%',
            border: `4px solid ${T.warn}`, display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <span style={{ fontWeight: 900, fontSize: 36, color: T.warn }}>{keeperCountdown}</span>
          </div>
          <div style={{ color: T.sub, fontSize: 13, marginTop: 16 }}>Ripresa automatica...</div>
        </div>
      )}

      {/* Goal Toast */}
      {lastGoal && (
        <div style={{
          position: 'absolute', top: 16, left: '50%', transform: 'translateX(-50%)',
          background: lastGoal.team === 'A' ? T.teamA : T.teamB,
          color: '#fff', borderRadius: 20, padding: '10px 20px', fontWeight: 700,
          fontSize: 14, zIndex: 40, whiteSpace: 'nowrap', boxShadow: '0 4px 20px rgba(0,0,0,.4)',
          animation: 'none',
        }}>
          ⚽ GOL! {lastGoal.name} ({lastGoal.minute}')
        </div>
      )}

      <Header title="Partita Live 🔴" back />
      <div style={{ padding: '12px 20px 100px' }}>
        {/* Score + Timer */}
        <Card style={{ background: T.accentDim, border: `1px solid ${T.accent}30`, marginBottom: 16, textAlign: 'center' }}>
          {/* Score */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 24, marginBottom: 14 }}>
            <div>
              <div style={{ color: T.teamA, fontWeight: 700, fontSize: 12, marginBottom: 4 }}>SQUADRA A</div>
              <div style={{ fontWeight: 900, fontSize: 56, color: T.teamA, lineHeight: 1 }}>{scoreA}</div>
            </div>
            <div style={{ color: T.muted, fontWeight: 900, fontSize: 32 }}>–</div>
            <div>
              <div style={{ color: T.teamB, fontWeight: 700, fontSize: 12, marginBottom: 4 }}>SQUADRA B</div>
              <div style={{ fontWeight: 900, fontSize: 56, color: T.teamB, lineHeight: 1 }}>{scoreB}</div>
            </div>
          </div>

          {/* Timer */}
          <div style={{ fontWeight: 900, fontSize: 42, fontVariantNumeric: 'tabular-nums', color: remaining < 300 ? T.danger : T.text, marginBottom: 8 }}>
            {fmt(remaining)}
          </div>

          {/* Progress bar */}
          <div style={{ height: 6, background: T.border, borderRadius: 3, marginBottom: 14, overflow: 'hidden' }}>
            <div style={{ height: '100%', width: `${progress * 100}%`, background: T.accent, borderRadius: 3, transition: 'width .5s linear' }} />
          </div>

          {/* Next keeper change indicator */}
          <div style={{ color: T.sub, fontSize: 12, marginBottom: 14 }}>
            🥅 Prossimo cambio portiere: {fmt(KEEPER_INTERVAL - (elapsed % KEEPER_INTERVAL))}
          </div>

          {/* Controls */}
          <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
            <button onClick={() => setRunning(r => !r)} disabled={keeperPause || elapsed >= totalSecs} style={{
              background: running ? T.warn + '33' : T.accent,
              color: running ? T.warn : '#000',
              border: `2px solid ${running ? T.warn : T.accent}`,
              borderRadius: 40, padding: '10px 24px', fontWeight: 800, fontSize: 15,
              opacity: (keeperPause || elapsed >= totalSecs) ? 0.5 : 1,
            }}>
              {running ? '⏸ Pausa' : elapsed === 0 ? '▶ Avvia' : '▶ Riprendi'}
            </button>
            <button onClick={undoGoal} disabled={goals.length === 0} style={{
              background: T.card, color: T.danger, border: `1px solid ${T.danger}40`,
              borderRadius: 40, padding: '10px 16px', fontWeight: 700, fontSize: 13,
              opacity: goals.length === 0 ? 0.4 : 1,
            }}>↩ Annulla</button>
            <button onClick={endMatch} style={{
              background: T.danger + '22', color: T.danger, border: `1px solid ${T.danger}40`,
              borderRadius: 40, padding: '10px 16px', fontWeight: 700, fontSize: 13,
            }}>■ Fine</button>
            <button onClick={() => setTotalSecs(s => s + 360)} style={{
              background: T.warn + '22', color: T.warn, border: `1px solid ${T.warn}40`,
              borderRadius: 40, padding: '10px 16px', fontWeight: 700, fontSize: 13,
            }}>+6'</button>
          </div>
        </Card>

        {/* Layout Condizionale: Desktop/Tablet vs Mobile */}
        <div style={{ 
          display: 'grid', 
          gridTemplateColumns: isWide ? '1fr 1fr' : '1fr', 
          gap: 20 
        }}>
          {/* Team A column */}
          {(isWide || activeTab === 'A') && (
            <div>
              <div style={{ color: T.teamA, fontWeight: 800, fontSize: 13, marginBottom: 10, display: isWide ? 'block' : 'none' }}>SQUADRA A</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {teamAPlayers.map(p => (
                  <button key={p.id} onClick={() => setSelectingAssist({ player: p, team: 'A' })} style={{
                    display: 'flex', alignItems: 'center', gap: 12, padding: '13px 16px',
                    borderRadius: 14, background: T.card, border: `1px solid ${T.border}`,
                    textAlign: 'left', width: '100%', cursor: 'pointer',
                    transition: 'transform .1s',
                  }}>
                    <Avatar name={p.name} size={36} color={T.teamA} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{p.name.split(' ')[0]}</div>
                    </div>
                    {playerGoals[p.id] > 0 && <span style={{ color: T.accent, fontWeight: 800 }}>⚽{playerGoals[p.id]}</span>}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Team B column */}
          {(isWide || activeTab === 'B') && (
            <div>
              <div style={{ color: T.teamB, fontWeight: 800, fontSize: 13, marginBottom: 10, display: isWide ? 'block' : 'none' }}>SQUADRA B</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {teamBPlayers.map(p => (
                  <button key={p.id} onClick={() => setSelectingAssist({ player: p, team: 'B' })} style={{
                    display: 'flex', alignItems: 'center', gap: 12, padding: '13px 16px',
                    borderRadius: 14, background: T.card, border: `1px solid ${T.border}`,
                    textAlign: 'left', width: '100%', cursor: 'pointer',
                    transition: 'transform .1s',
                  }}>
                    <Avatar name={p.name} size={36} color={T.teamB} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{p.name.split(' ')[0]}</div>
                    </div>
                    {playerGoals[p.id] > 0 && <span style={{ color: T.accent, fontWeight: 800 }}>⚽{playerGoals[p.id]}</span>}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Recent goals (Full width below) */}
        {goals.length > 0 && (
          <div style={{ marginTop: 24 }}>
            <div style={{ fontWeight: 700, fontSize: 12, color: T.sub, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Gol Recenti</div>
            <div style={{ display: 'grid', gridTemplateColumns: isWide ? '1fr 1fr' : '1fr', gap: isWide ? 20 : 0 }}>
              {[...goals].reverse().map((g, i) => {
                const idx = goals.length - 1 - i;
                const p = [...teamAPlayers, ...teamBPlayers].find(pl => pl.id === g.playerId);
                const ast = [...teamAPlayers, ...teamBPlayers].find(pl => pl.id === g.assistantId);
                return (
                  <div key={idx} onClick={() => setEditingGoal(idx)} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 0', borderBottom: `1px solid ${T.border}`, cursor: 'pointer' }}>
                    <span style={{ color: T.sub, fontSize: 12, width: 28 }}>{g.minute}'</span>
                    <span style={{ fontSize: 14 }}>⚽</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{p?.name}</div>
                      {ast && <div style={{ fontSize: 10, color: T.sub }}>Assist: {ast.name.split(' ')[0]}</div>}
                    </div>
                    <Pill label={`Sqd ${g.team}`} color={g.team === 'A' ? T.teamA : T.teamB} />
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Assist Overlay */}
        {selectingAssist && (
          <div style={{ position: 'fixed', inset: 0, zIndex: 60, background: 'rgba(0,0,0,.9)', display: 'flex', alignItems: 'flex-end' }}>
            <div style={{ background: T.surf, width: '100%', borderRadius: '24px 24px 0 0', padding: 24, maxHeight: '80%', overflowY: 'auto' }}>
              <div style={{ fontWeight: 800, fontSize: 20, marginBottom: 4, color: T.accent }}>GOL DI {selectingAssist.player.name.toUpperCase()}! ⚽</div>
              <div style={{ color: T.sub, fontSize: 14, marginBottom: 20 }}>Chi ha fatto l'assist?</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 }}>
                {(selectingAssist.team === 'A' ? teamAPlayers : teamBPlayers)
                  .filter(p => p.id !== selectingAssist.player.id)
                  .map(p => (
                    <button key={p.id} onClick={() => addGoal(selectingAssist.player, selectingAssist.team, p.id)} style={{
                      background: T.card, border: `1px solid ${T.border}`, borderRadius: 12, padding: 12, textAlign: 'center'
                    }}>
                      <div style={{ fontWeight: 700, fontSize: 13 }}>{p.name.split(' ')[0]}</div>
                    </button>
                  ))}
                <button onClick={() => addGoal(selectingAssist.player, selectingAssist.team, null)} style={{
                  background: T.border, borderRadius: 12, padding: 12, textAlign: 'center', gridColumn: 'span 2'
                }}>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>Nessun Assist</div>
                </button>
              </div>
              <Btn full secondary label="Annulla Gol" danger onClick={() => setSelectingAssist(null)} />
            </div>
          </div>
        )}

        {/* Edit Goal Overlay */}
        {editingGoal !== null && (
          <div style={{ position: 'fixed', inset: 0, zIndex: 60, background: 'rgba(0,0,0,.8)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
            <Card style={{ width: '100%', maxWidth: 320 }}>
              <div style={{ fontWeight: 800, fontSize: 18, marginBottom: 20, textAlign: 'center' }}>Modifica Gol</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                <Btn full danger label="Elimina Gol 🗑" onClick={() => removeGoal(editingGoal)} />
                <Btn full secondary label="Chiudi" onClick={() => setEditingGoal(null)} />
              </div>
            </Card>
          </div>
        )}
      </div>
    </Screen>
  );
}

// ── PROFILE SCREEN ────────────────────────────────────────────────────────
function ProfileScreen() {
  const { data, setData } = useApp();
  const [isEditing, setIsEditing] = useState(false);
  const [tempName, setTempName] = useState(data.user.name);

  const allGoals = data.groups.flatMap(g => g.matches.flatMap(m => m.goals.filter(goal => goal.playerId === data.user.id)));
  const matchesCount = data.groups.flatMap(g => g.matches.filter(m => m.status === 'finished' && [...m.teamA, ...m.teamB].some(p => p.id === data.user.id))).length;
  const winsCount = data.groups.flatMap(g => g.matches.filter(m => {
    if (m.status !== 'finished') return false;
    const inA = m.teamA.some(p => p.id === data.user.id);
    const inB = m.teamB.some(p => p.id === data.user.id);
    return (inA && m.scoreA > m.scoreB) || (inB && m.scoreB > m.scoreA);
  })).length;

  const saveName = () => {
    if (!tempName.trim()) return;
    setData(prev => ({ ...prev, user: { ...prev.user, name: tempName.trim() } }));
    setIsEditing(false);
  };

  return (
    <Screen>
      <div style={{ padding: '56px 20px 20px' }}>
        <div style={{ textAlign: 'center', marginBottom: 28 }}>
          <div style={{ position: 'relative', display: 'inline-block' }}>
            <Avatar name={data.user.name} size={72} />
            <button onClick={() => setIsEditing(true)} style={{ position: 'absolute', bottom: 0, right: 0, background: T.accent, borderRadius: '50%', width: 24, height: 24, fontSize: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#000', border: `2px solid ${T.bg}` }}>✎</button>
          </div>

          {isEditing ? (
            <div style={{ marginTop: 12, display: 'flex', gap: 8, justifyContent: 'center' }}>
              <input 
                value={tempName} 
                onChange={e => setTempName(e.target.value)}
                autoFocus
                style={{ background: T.card, border: `1px solid ${T.accent}`, borderRadius: 8, padding: '4px 12px', color: '#fff', fontSize: 16, outline: 'none' }}
              />
              <button onClick={saveName} style={{ background: T.accent, color: '#000', borderRadius: 8, padding: '4px 12px', fontWeight: 700 }}>OK</button>
            </div>
          ) : (
            <div style={{ fontWeight: 800, fontSize: 22, marginTop: 12 }}>{data.user.name}</div>
          )}
          
          <div style={{ marginTop: 8, display: 'flex', gap: 8, justifyContent: 'center' }}>
            <button onClick={() => setData(prev => ({ ...prev, user: { ...prev.user, role: prev.user.role === 'admin' ? 'player' : 'admin' } }))}
              style={{
                background: data.user.role === 'admin' ? T.accentDim : T.card,
                color: data.user.role === 'admin' ? T.accent : T.sub,
                border: `1px solid ${data.user.role === 'admin' ? T.accent : T.border}`,
                borderRadius: 20, padding: '6px 16px', fontWeight: 700, fontSize: 13,
              }}>
              {data.user.role === 'admin' ? '⚙️ Admin' : '👤 Giocatore'}
            </button>
            <button onClick={() => {
              if(confirm("Sei sicuro? Questo cancellerà TUTTI i dati dell'app (gruppi, partite, giocatori) e non potrai tornare indietro.")) {
                localStorage.removeItem('kickoff_data');
                window.location.reload();
              }
            }} style={{ background: T.danger + '22', color: T.danger, border: `1px solid ${T.danger}40`, borderRadius: 20, padding: '6px 12px', fontSize: 13, fontWeight: 700 }}>
              🗑 Reset
            </button>
          </div>
        </div>

        {/* Stats */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 24 }}>
          {[
            { label: 'Partite giocate', val: matchesCount, icon: '🏟' },
            { label: 'Gol segnati', val: allGoals.length, icon: '⚽' },
            { label: 'Vittorie', val: winsCount, icon: '🏆' },
            { label: 'Win Rate', val: matchesCount ? Math.round((winsCount / matchesCount) * 100) + '%' : '-', icon: '📈' },
          ].map(s => (
            <Card key={s.label} style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 24, marginBottom: 4 }}>{s.icon}</div>
              <div style={{ fontWeight: 900, fontSize: 28, color: T.accent }}>{s.val}</div>
              <div style={{ color: T.sub, fontSize: 11, marginTop: 2 }}>{s.label}</div>
            </Card>
          ))}
        </div>

        {/* Trofei */}
        <div style={{ fontWeight: 700, fontSize: 14, color: T.sub, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Trofei</div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
          {[
            { icon: '🥇', label: 'Capocannoniere' },
            { icon: '🏆', label: '10+ Vittorie' },
            { icon: '⚡', label: '30+ Gol' },
          ].map(t => (
            <Card key={t.label} style={{ padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 8, border: `1px solid ${T.warn}30` }}>
              <span style={{ fontSize: 20 }}>{t.icon}</span>
              <span style={{ fontSize: 12, fontWeight: 600, color: T.warn }}>{t.label}</span>
            </Card>
          ))}
        </div>
      </div>
    </Screen>
  );
}

const TABS = [
  { id: 'home', icon: '🏠', label: 'Home' },
  { id: 'groups', icon: '👥', label: 'Gruppi' },
  { id: 'convocazioni', icon: '📋', label: 'Convocazioni' },
  { id: 'profile', icon: '👤', label: 'Profilo' },
];

function BottomNav({ tab, setTab }) {
  const { data } = useApp();
  const pending = data.convocazioni.filter(c => c.status === 'pending').length;
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      background: T.surf, borderTop: `1px solid ${T.border}`,
      display: 'flex', padding: '8px 0 20px', zIndex: 20,
    }}>
      {TABS.map(t => (
        <button key={t.id} onClick={() => setTab(t.id)} style={{
          flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
          padding: '4px 0', position: 'relative',
        }}>
          <span style={{ fontSize: 22 }}>{t.icon}</span>
          <span style={{ fontSize: 10, fontWeight: tab === t.id ? 700 : 500, color: tab === t.id ? T.accent : T.sub }}>
            {t.label}
          </span>
          {t.id === 'convocazioni' && pending > 0 && (
            <div style={{
              position: 'absolute', top: 0, right: '22%', width: 16, height: 16,
              background: T.danger, borderRadius: '50%', fontSize: 9,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontWeight: 800, color: '#fff',
            }}>{pending}</div>
          )}
        </button>
      ))}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(() => {
    try { const s = localStorage.getItem('kickoff_data'); return s ? JSON.parse(s) : INIT_DATA; } catch { return INIT_DATA; }
  });
  const [tab, setTab] = useState('home');
  const [stack, setStack] = useState([]);

  useEffect(() => {
    try { localStorage.setItem('kickoff_data', JSON.stringify(data)); } catch {}
  }, [data]);

  const push = useCallback((screen, params = {}) => setStack(s => [...s, { screen, params }]), []);
  const pop = useCallback(() => setStack(s => s.slice(0, -1)), []);

  const renderScreen = (s) => {
    if (!s) {
      if (tab === 'home') return <HomeScreen />;
      if (tab === 'groups') return <GroupsScreen />;
      if (tab === 'convocazioni') return <ConvocazioniScreen />;
      if (tab === 'profile') return <ProfileScreen />;
    }
    const { screen, params } = s;
    if (screen === 'groupDetail') return <GroupDetailScreen {...params} />;
    if (screen === 'createMatch') return <CreateMatchScreen {...params} />;
    if (screen === 'matchDetail') return <MatchDetailScreen {...params} />;
    if (screen === 'live') return <LiveScreen {...params} />;
    if (screen === 'share') return <ShareScreen {...params} />;
    return null;
  };

  const current = stack[stack.length - 1] || null;
  const showNav = !current || !['live'].includes(current.screen);

  return (
    <Ctx.Provider value={{ data, setData, push, pop }}>
      <div style={{
        width: '100%', maxWidth: stack.length > 0 && stack[stack.length-1].screen === 'live' ? '1200px' : 480, 
        margin: '0 auto', height: '100dvh', 
        background: T.bg, position: 'relative', overflow: 'hidden',
        boxShadow: '0 0 80px rgba(0,230,118,.06)',
        transition: 'max-width .3s ease',
      }}>
        <div style={{ height: showNav ? 'calc(100% - 72px)' : '100%', overflow: 'hidden' }}>
          {renderScreen(current)}
        </div>
        {showNav && <BottomNav tab={tab} setTab={(t) => { setTab(t); setStack([]); }} />}
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./kickoff-sw.js')
      .then(r => console.log('SW registrato:', r.scope))
      .catch(e => console.warn('SW errore:', e));
  });
}
</script>
